<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitCoven — Learn Git From Scratch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg0:#0a0e13;--bg1:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;--border:#30363d;--border-hi:#444c56;--accent:#3fb950;--accent-dim:rgba(63,185,80,.15);--accent-blue:#58a6ff;--accent-orange:#e3b341;--accent-purple:#bc8cff;--accent-red:#f85149;--accent-teal:#39c5cf;--text0:#e6edf3;--text1:#c9d1d9;--text2:#8b949e;--text3:#484f58;--lab-bg:#0d2818;--lab-border:#2ea043;--radius:8px;--radius-lg:12px;--sidebar-w:280px;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg0);color:var(--text1);min-height:100vh;display:flex;font-size:15px;line-height:1.7;overflow-x:hidden;}

/* SIDEBAR */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg1);border-right:1px solid var(--border);height:100vh;position:sticky;top:0;overflow-y:auto;display:flex;flex-direction:column;z-index:10;}
#sidebar::-webkit-scrollbar{width:4px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px;}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg1);z-index:1;}
.sidebar-header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.sidebar-close{display:none;width:28px;height:28px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;cursor:pointer;align-items:center;justify-content:center;font-size:14px;color:var(--text2);flex-shrink:0;margin-top:2px;}
@media(max-width:768px){.sidebar-close{display:flex;}}
.sidebar-logo{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.logo-icon{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;line-height:1.2;letter-spacing:-.01em;}
.logo-text .git{color:var(--text0);}
.logo-text .coven{color:var(--accent);}
.logo-sub{font-size:10.5px;color:var(--text3);font-weight:400;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;}
.progress-wrap{margin-top:4px;}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px;}
.progress-track{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}
.sidebar-nav{padding:8px 0;flex:1;}
.nav-section-label{padding:12px 20px 4px;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 20px;cursor:pointer;transition:background .12s;border-left:3px solid transparent;}
.nav-item:hover{background:var(--bg2);}
.nav-item.active{background:rgba(63,185,80,.08);border-left-color:var(--accent);}
.nav-item.locked-item{opacity:.45;pointer-events:none;}
.nav-num{width:20px;height:20px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--text2);flex-shrink:0;font-family:'JetBrains Mono',monospace;}
.nav-item.active .nav-num{background:var(--accent);color:#0a0e13;}
.nav-item.done .nav-num{background:rgba(63,185,80,.2);color:var(--accent);}
.nav-text{font-size:13px;color:var(--text2);flex:1;line-height:1.3;}
.nav-item.active .nav-text{color:var(--text0);font-weight:500;}

/* MAIN */
#main{flex:1;min-width:0;display:flex;flex-direction:column;}
#topbar{background:var(--bg1);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:9;}
.topbar-phase{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.05em;}
.topbar-title{font-size:14px;font-weight:500;color:var(--text0);margin-top:2px;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.btn{padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text1);font-size:13px;cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif;}
.btn:hover{background:var(--bg3);border-color:var(--border-hi);color:var(--text0);}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#0a0e13;font-weight:500;}
.btn-accent:hover{background:#4dd860;color:#0a0e13;}
.btn-locked{background:var(--bg3)!important;border-color:var(--border)!important;color:var(--text3)!important;cursor:not-allowed!important;pointer-events:none;}
#content-area{flex:1;padding:40px 48px 120px;max-width:860px;}
.topbar-user{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;}
.topbar-user-name{color:var(--accent);font-weight:500;}

/* NAME PROMPT OVERLAY */
#name-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.name-modal{background:var(--bg1);border:1px solid var(--border-hi);border-radius:var(--radius-lg);padding:40px 48px;max-width:440px;width:90%;text-align:center;}
.name-modal-cauldron{margin-bottom:20px;}
.name-modal-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--text0);margin-bottom:8px;}
.name-modal-sub{font-size:14px;color:var(--text2);margin-bottom:28px;line-height:1.6;}
.name-modal-label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;text-align:left;}
.name-modal-input{width:100%;padding:12px 16px;background:var(--bg0);border:1px solid var(--border-hi);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text0);outline:none;margin-bottom:16px;transition:border-color .15s;}
.name-modal-input:focus{border-color:var(--accent);}
.name-modal-input::placeholder{color:var(--text3);}
.name-modal-btn{width:100%;padding:12px;background:var(--accent);border:none;border-radius:var(--radius);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#0a0e13;cursor:pointer;transition:background .15s;}
.name-modal-btn:hover{background:#4dd860;}
.name-modal-footer{font-size:11px;color:var(--text3);margin-top:14px;font-family:'JetBrains Mono',monospace;}

/* PHASE HEADER */
.phase-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.phase-heading{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;color:var(--text0);line-height:1.15;margin-bottom:8px;}
.phase-sub{font-size:16px;color:var(--text2);margin-bottom:32px;max-width:560px;}
.phase-divider{height:1px;background:linear-gradient(to right,var(--border),transparent);margin-bottom:32px;}
.section{margin-bottom:36px;}
.section-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* CARDS */
.cards{display:flex;flex-direction:column;gap:10px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;}
.card-title{font-size:13.5px;font-weight:500;color:var(--text0);margin-bottom:5px;}
.card p{font-size:13.5px;color:var(--text2);line-height:1.65;}
.card p+p{margin-top:6px;}
.card ul{margin-top:6px;padding-left:18px;}
.card ul li{font-size:13.5px;color:var(--text2);margin-bottom:3px;}

/* CODE BLOCKS */
.codeblock-wrap{position:relative;margin:8px 0 14px;}
.codeblock-label{background:var(--bg3);border:1px solid var(--border);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;padding:5px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.05em;display:flex;justify-content:space-between;align-items:center;}
.dots{display:flex;gap:5px;}
.dot{width:8px;height:8px;border-radius:50%;}
.dot-r{background:#f85149;}.dot-y{background:#e3b341;}.dot-g{background:#3fb950;}
pre{background:var(--bg1);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);padding:16px 20px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.75;color:var(--text0);}
pre::-webkit-scrollbar{height:4px;}
pre::-webkit-scrollbar-thumb{background:var(--border-hi);}
.cmt{color:var(--text3);font-style:italic;}
.kw{color:var(--accent-blue);}
.str{color:var(--accent-orange);}
.hl{color:var(--accent);font-weight:500;}
.hl2{color:var(--accent-purple);}
.hl3{color:var(--accent-teal);}
.err{color:var(--accent-red);}
.copy-btn{position:absolute;top:34px;right:10px;padding:3px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .12s;z-index:2;}
.copy-btn:hover{background:var(--bg4);color:var(--text0);}
.copy-btn.copied{color:var(--accent);border-color:var(--accent);}
code{font-family:'JetBrains Mono',monospace;font-size:12.5px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:1px 6px;color:var(--accent-orange);}

/* CALLOUTS */
.tip,.warn,.danger,.info{border-radius:var(--radius);padding:12px 16px;margin:10px 0;font-size:13.5px;line-height:1.65;display:flex;gap:12px;align-items:flex-start;}
.tip{background:#0c2a4a;border:1px solid #388bfd;color:#79c0ff;}
.warn{background:#2b1700;border:1px solid #e3b341;color:#e3b341;}
.danger{background:#2d0f0f;border:1px solid #f85149;color:#ffa198;}
.info{background:var(--accent-dim);border:1px solid rgba(63,185,80,.3);color:#7ee787;}
.callout-icon{font-size:16px;flex-shrink:0;margin-top:1px;}

/* DIAGRAM */
.diagram{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin:10px 0 14px;overflow-x:auto;}
.diagram-flex{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;}
.d-node{background:var(--bg3);border:1px solid var(--border-hi);border-radius:var(--radius);padding:10px 18px;text-align:center;min-width:110px;}
.d-node.accent{border-color:var(--accent);background:rgba(63,185,80,.08);}
.d-node.blue{border-color:var(--accent-blue);background:rgba(88,166,255,.08);}
.d-node.orange{border-color:var(--accent-orange);background:rgba(227,179,65,.08);}
.d-label{font-size:10px;color:var(--text3);margin-bottom:3px;font-family:'JetBrains Mono',monospace;letter-spacing:.05em;text-transform:uppercase;}
.d-name{font-size:13px;font-weight:500;color:var(--text0);}
.d-arrow{color:var(--text3);font-size:18px;padding:0 4px;align-self:center;}
.d-arrow-v{display:flex;flex-direction:column;align-items:center;gap:4px;}
.d-cmd{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent-blue);margin-top:3px;}

/* LAB BOX */
.lab-box{background:var(--lab-bg);border:1px solid var(--lab-border);border-radius:var(--radius-lg);padding:20px 24px;margin-top:8px;}
.lab-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.lab-badge{background:var(--accent);color:#0a0e13;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;padding:3px 8px;border-radius:4px;}
.lab-title{font-size:15px;font-weight:500;color:#7ee787;}
.lab-steps{display:flex;flex-direction:column;gap:10px;}
.lab-step{display:flex;gap:12px;align-items:flex-start;padding:10px 14px;background:rgba(0,0,0,.3);border-radius:var(--radius);border:1px solid rgba(46,160,67,.2);}
.step-num{width:22px;height:22px;border-radius:50%;background:rgba(63,185,80,.2);border:1px solid var(--lab-border);color:var(--accent);font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-body{flex:1;font-size:13.5px;color:#b5e8b5;line-height:1.6;}
.step-body code{background:rgba(63,185,80,.1);border-color:rgba(63,185,80,.3);color:#7ee787;}

/* CHEATSHEET */
.cheat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cheat-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;}
.cheat-cmd{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent-orange);font-weight:500;}
.cheat-desc{font-size:12px;color:var(--text2);margin-top:3px;}

/* ═══════════════════════════════════════════
   CHALLENGE SYSTEM — THE LOCK
═══════════════════════════════════════════ */
.challenge-section{margin-top:40px;}
.challenge-header{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.challenge-icon{font-size:20px;}
.challenge-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text0);}
.challenge-subtitle{font-size:13px;color:var(--text2);margin-bottom:24px;padding-left:32px;}

.challenge-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden;transition:border-color .2s;}
.challenge-card.solved{border-color:var(--accent);}
.challenge-card.failed{border-color:var(--accent-red);animation:shake .35s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}15%{transform:translateX(-8px);}30%{transform:translateX(8px);}45%{transform:translateX(-6px);}60%{transform:translateX(6px);}75%{transform:translateX(-3px);}90%{transform:translateX(3px);}}

.challenge-q-header{padding:14px 18px;display:flex;align-items:flex-start;gap:12px;}
.cq-num{width:26px;height:26px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0;margin-top:2px;transition:all .2s;}
.challenge-card.solved .cq-num{background:rgba(63,185,80,.2);border-color:var(--accent);color:var(--accent);}
.challenge-card.failed .cq-num{background:rgba(248,81,73,.15);border-color:var(--accent-red);color:var(--accent-red);}
.cq-text{flex:1;}
.cq-question{font-size:14px;color:var(--text0);line-height:1.6;font-weight:500;}
.cq-scenario{font-size:12.5px;color:var(--text2);margin-top:4px;line-height:1.55;font-style:italic;}

.challenge-input-row{padding:0 18px 16px;display:flex;gap:8px;align-items:flex-start;}
.challenge-input-wrap{flex:1;position:relative;}
.challenge-input{width:100%;padding:10px 14px;background:var(--bg1);border:1px solid var(--border);border-radius:var(--radius);font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text0);outline:none;transition:border-color .15s;}
.challenge-input:focus{border-color:var(--border-hi);}
.challenge-input::placeholder{color:var(--text3);}
.challenge-card.solved .challenge-input{border-color:var(--accent);background:rgba(63,185,80,.04);color:var(--accent);}
.challenge-card.failed .challenge-input{border-color:var(--accent-red);}
.challenge-card.solved .challenge-input{pointer-events:none;}

.challenge-submit{padding:9px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--text1);cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0;}
.challenge-submit:hover{background:var(--bg4);color:var(--text0);}
.challenge-card.solved .challenge-submit{background:rgba(63,185,80,.15);border-color:var(--accent);color:var(--accent);pointer-events:none;}

.challenge-feedback{padding:10px 18px 14px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.6;display:none;border-top:1px solid var(--border);}
.challenge-card.solved .challenge-feedback{display:flex;gap:10px;color:#7ee787;background:rgba(63,185,80,.05);}
.challenge-card.failed .challenge-feedback{display:flex;gap:10px;color:#ffa198;background:rgba(248,81,73,.05);}
.feedback-icon{flex-shrink:0;}

.attempts-badge{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:4px;transition:color .2s;}
.attempts-badge.warning{color:var(--accent-red);}

/* LOCK BAR — shown when not all challenges solved */
.lock-bar{background:linear-gradient(135deg,#1a0f0f,#1f1214);border:1px solid var(--accent-red);border-radius:var(--radius-lg);padding:18px 24px;display:flex;align-items:center;gap:16px;margin-top:8px;}
.lock-bar.unlocked{background:linear-gradient(135deg,#0d2818,#0a1f10);border-color:var(--accent);}
.lock-bar-icon{font-size:28px;flex-shrink:0;}
.lock-bar-text{flex:1;}
.lock-bar-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text0);}
.lock-bar-sub{font-size:13px;color:var(--text2);margin-top:2px;}
.lock-progress-row{display:flex;gap:6px;margin-top:10px;}
.lock-pip{width:28px;height:6px;border-radius:3px;background:var(--bg4);transition:background .3s;}
.lock-pip.done-pip{background:var(--accent);}

/* BOTTOM NAV */
#bottom-nav{position:fixed;bottom:0;left:var(--sidebar-w);right:0;background:linear-gradient(to top,var(--bg0) 60%,transparent);padding:20px 48px 24px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;z-index:8;}
#bottom-nav .btn{pointer-events:all;}
.phase-counter{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);text-align:center;}
.phase-counter-lock{font-size:14px;display:block;}
.wiredhash{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:.06em;text-align:center;padding:8px 0 0;border-top:1px solid var(--border);margin-top:6px;}
.wiredhash span{color:var(--accent);}

/* MOBILE */
#mob-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border-hi);border-radius:8px;cursor:pointer;align-items:center;justify-content:center;font-size:18px;color:var(--text0);transition:background .15s;}
#sidebar.open ~ * #mob-toggle, #mob-toggle.hidden{display:none!important;}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:49;}
@media(max-width:768px){body{flex-direction:column;}#sidebar{position:fixed;left:-300px;top:0;transition:left .25s ease;height:100%;z-index:50;}#sidebar.open{left:0;}#sidebar-overlay.open{display:block;}#mob-toggle{display:flex;}#main{width:100%;}#content-area{padding:20px 20px 120px;}#topbar{padding:12px 20px;padding-left:58px;}#bottom-nav{left:0;padding:16px 20px 20px;}.phase-heading{font-size:26px;}.cheat-grid{grid-template-columns:1fr;}}

/* COMPLETE SCREEN */
.complete-screen{text-align:center;padding:60px 20px;}
.complete-icon{width:80px;height:80px;background:var(--accent-dim);border:2px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 24px;}
.complete-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--text0);margin-bottom:12px;}
.complete-sub{font-size:16px;color:var(--text2);max-width:420px;margin:0 auto 28px;}
.stats-row{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 24px;text-align:center;}
.stat-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent);}
.stat-label{font-size:12px;color:var(--text2);margin-top:2px;}
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px;}
</style>
</head>
<body>
<!-- NAME PROMPT -->
<div id="name-overlay">
  <div class="name-modal">
    <div class="name-modal-cauldron">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 22 Q9 38 26 40 Q43 38 42 22 Z" fill="#0d2818" stroke="#3fb950" stroke-width="2" stroke-linejoin="round"/>
        <rect x="8" y="18" width="36" height="5" rx="2.5" fill="#21262d" stroke="#3fb950" stroke-width="1.8"/>
        <line x1="15" y1="40" x2="13" y2="48" stroke="#3fb950" stroke-width="2" stroke-linecap="round"/>
        <line x1="37" y1="40" x2="39" y2="48" stroke="#3fb950" stroke-width="2" stroke-linecap="round"/>
        <circle cx="26" cy="31" r="2.5" fill="#3fb950"/>

{
  title:"What is Version Control?",sub:"The problem Git solves, and why it won",
  sections:[
    {label:"The problem without version control",cards:[
      {title:"Folder hell",body:"Without version control, developers end up with <code>project_v1</code>, <code>project_v2_final</code>, <code>project_FINAL_REAL</code>. No way to see what changed, who changed it, or why."},
      {title:"Team chaos",body:"When multiple people work on the same file, the last person to save wins — everyone else's work is gone. There is no record of who deleted what."}
    ]},
    {label:"Version Control Systems (VCS)",cards:[
      {title:"Local VCS (1970s–80s)",body:"Stored patches on disk. Only local. One person at a time. Examples: RCS."},
      {title:"Centralized VCS (1990s–2000s)",body:"One central server. Single point of failure — if server goes down, nobody works. Examples: CVS, SVN, Perforce."},
      {title:"Distributed VCS (2005–present)",body:"Every developer has a full copy of the entire repo history. No single point of failure. Work offline. Examples: Git, Mercurial."}
    ]},
    {label:"Why Git won",cards:[
      {title:"Born from necessity",body:"In 2005, Linus Torvalds built Git in two weeks after a dispute with BitKeeper. Requirements: fast, fully distributed, strong support for non-linear development, able to handle the Linux kernel (thousands of contributors)."},
      {title:"Git's dominance today",body:"Over 90% of all software projects use Git. Every major platform — GitHub, GitLab, Bitbucket — is built on it. Knowing Git is non-negotiable for a developer."}
    ]},
    {label:"Core concepts",cards:[
      {title:"Repository (repo)",body:"A directory whose history Git tracks. Contains your files plus a hidden <code>.git</code> folder storing the entire history."},
      {title:"Commit",body:"A permanent snapshot of your files at a specific point in time. Like a save point in a game — you can always return to it."},
      {title:"Branch",body:"An independent line of development. Work on features in isolation without affecting the main codebase."},
      {title:"Remote",body:"A copy of your repository hosted elsewhere (GitHub, GitLab). Used for collaboration and backup."}
    ]}
  ],
  challenges:[
    {q:"What command do you run to verify Git is installed on your machine and see which version you have?",scenario:"You just followed installation instructions. Before doing anything else, you need to confirm Git is actually installed.",accept:["git --version","git --version ","git version"],feedback:"git --version prints the installed version number, e.g. 'git version 2.44.0'. If Git is not installed, you get an error instead."},
    {q:"What is the name of the hidden directory Git creates inside every repository to store its database?",scenario:"You ran git init in a folder. A new directory was silently created. Name it exactly (include the dot).",accept:[".git",".git/"],feedback:"The .git directory is Git's entire database — commits, branches, config, hooks, objects. Never manually delete or edit files inside it."},
    {q:"What type of VCS gives every developer a complete copy of the entire repository history on their local machine?",scenario:"You're explaining Git's architecture to a junior developer. Name the category of VCS that Git belongs to.",accept:["distributed","distributed vcs","distributed version control","distributed version control system"],feedback:"Distributed VCS means every developer has the full history. This allows offline work, no single point of failure, and faster operations since most commands don't need a network."}
  ]
},
{
  title:"Installation & Configuration",sub:"Getting Git ready, setting your identity",
  sections:[
    {label:"Install Git",codeblock:{lang:"bash",code:`<span class="cmt"># macOS</span>
<span class="hl">brew</span> install git

<span class="cmt"># Ubuntu / Debian</span>
sudo apt-get install git

<span class="cmt"># Windows — download from git-scm.com/download/win</span>

<span class="cmt"># Verify</span>
<span class="hl">git</span> --version`}},
    {label:"First-time configuration",content:`<p style="color:var(--text2);font-size:14px;margin-bottom:12px">Git stamps your name and email on every commit. Without this, Git refuses to commit.</p>`,codeblock:{lang:"bash",code:`<span class="hl">git config</span> --global user.name <span class="str">"Your Name"</span>
<span class="hl">git config</span> --global user.email <span class="str">"you@example.com"</span>
<span class="hl">git config</span> --global core.editor <span class="str">"code --wait"</span>
<span class="hl">git config</span> --global init.defaultBranch main
<span class="hl">git config</span> --list    <span class="cmt"># view all settings</span>`}},
    {label:"Configuration scopes",cards:[
      {title:"--system",body:"Every user on this computer. Stored in <code>/etc/gitconfig</code>. Requires admin rights."},
      {title:"--global",body:"All repos for the current user. Stored in <code>~/.gitconfig</code>. This is what you use most."},
      {title:"--local (default)",body:"Only the current repo. Stored in <code>.git/config</code>. Overrides global and system."}
    ]},
    {label:"Useful aliases",codeblock:{lang:"bash",code:`<span class="hl">git config</span> --global alias.st status
<span class="hl">git config</span> --global alias.lg <span class="str">"log --oneline --graph --all --decorate"</span>
<span class="hl">git config</span> --global alias.undo <span class="str">"reset --soft HEAD~1"</span>`}}
  ],
  challenges:[
    {q:"Type the exact command to set your global Git username to 'Ada Lovelace'.",scenario:"You just installed Git on a new machine. This is the first configuration command you must run.",accept:["git config --global user.name \"ada lovelace\"","git config --global user.name 'ada lovelace'","git config --global user.name ada lovelace"],feedback:"git config --global user.name sets the author name attached to every future commit on this machine. Use quotes around names with spaces."},
    {q:"Type the command to view all your current Git configuration settings.",scenario:"You want to confirm your name and email are correctly saved before making your first commit.",accept:["git config --list","git config --list ","git config -l"],feedback:"git config --list shows all config values from system, global, and local scopes combined. You can also open ~/.gitconfig directly with any text editor."},
    {q:"Which scope flag do you use to make a config setting apply to ALL repositories for your user account?",scenario:"You want your email to apply everywhere, not just in the current folder.",accept:["--global","-global","global"],feedback:"--global saves the setting to ~/.gitconfig which applies to all repositories owned by your user account. It's the right scope for identity settings like name and email."}
  ]
},
{
  title:"The Three Git Areas",sub:"Working directory, staging area, and repository",
  sections:[
    {label:"The core mental model",content:`<p style="color:var(--text2);font-size:14px;margin-bottom:16px">This is the single most important concept in Git. Everything else depends on understanding these three areas.</p>
<div class="diagram"><div class="diagram-flex">
<div class="d-node orange"><div class="d-label">Where you work</div><div class="d-name">Working Directory</div><div class="d-cmd">files on disk</div></div>
<div class="d-arrow-v"><div class="d-arrow">→</div><div style="font-size:10px;color:var(--accent-blue);font-family:'JetBrains Mono',monospace">git add</div></div>
<div class="d-node accent"><div class="d-label">Prepared changes</div><div class="d-name">Staging Area</div><div class="d-cmd">the index</div></div>
<div class="d-arrow-v"><div class="d-arrow">→</div><div style="font-size:10px;color:var(--accent-blue);font-family:'JetBrains Mono',monospace">git commit</div></div>
<div class="d-node blue"><div class="d-label">Permanent history</div><div class="d-name">Repository</div><div class="d-cmd">.git/objects</div></div>
</div></div>`},
    {label:"Area explanations",cards:[
      {title:"1. Working Directory",body:"The actual files on your hard drive. This is where you edit code. Git sees these changes but has not saved them. Like your kitchen counter — where you prepare."},
      {title:"2. Staging Area (Index)",body:"An intermediate area where you prepare your next commit. You choose exactly which changes go in. Think of it as the plate — you choose which ingredients go on it."},
      {title:"3. Repository (.git directory)",body:"The permanent database of all your commits. Stored inside the hidden <code>.git</code> folder. Like the recipe book — every dish recorded forever."}
    ]},
    {label:"File states",cards:[
      {title:"Untracked",body:"A new file Git has never seen. Won't be included in commits until you <code>git add</code> it."},
      {title:"Modified (Unstaged)",body:"A tracked file that's been changed in the working directory but not yet staged."},
      {title:"Staged",body:"A file (or specific changes within it) added to the staging area with <code>git add</code>. Will be included in the next commit."},
      {title:"Committed (Unmodified)",body:"File in working dir matches the latest committed version. Nothing to do."}
    ]},
    {label:"Granular staging",codeblock:{lang:"bash",code:`<span class="cmt"># Stage only PART of a file's changes</span>
<span class="hl">git add</span> -p filename.js
<span class="cmt"># y = stage this chunk</span>
<span class="cmt"># n = skip this chunk</span>
<span class="cmt"># s = split into smaller chunks</span>`}}
  ],
  challenges:[
    {q:"You staged a file by mistake. Type the exact command to move it back OUT of the staging area without losing your changes.",scenario:"You ran git add secrets.env accidentally. You need to unstage it before committing.",accept:["git restore --staged secrets.env","git restore --staged","git reset head secrets.env","git reset head -- secrets.env"],feedback:"git restore --staged removes the file from the index (staging area) but leaves your changes intact in the working directory. The older syntax is git reset HEAD filename."},
    {q:"Name all three Git areas in order, separated by commas.",scenario:"Describe the path a change travels from your keyboard to a permanent commit.",accept:["working directory, staging area, repository","working directory, staging area, repo","working directory,staging area,repository","working dir, staging area, repository","working directory, index, repository","working directory, the index, repository"],feedback:"Changes move: Working Directory (you edit) → Staging Area / Index (git add) → Repository (git commit). Understanding this flow makes every other Git concept make sense."},
    {q:"What flag do you add to git add to interactively choose which specific chunks of a file to stage?",scenario:"You changed 5 things in app.js but only want to stage 2 of them in this commit.",accept:["-p","--patch","-p flag","--patch flag"],feedback:"git add -p (or --patch) opens an interactive mode that shows each change 'hunk' and lets you choose y (yes), n (no), s (split), or q (quit). Extremely useful for crafting clean, atomic commits."}
  ]
},
{
  title:"Basic Workflow: init, add, commit",sub:"Creating repos and making your first commits",
  sections:[
    {label:"Starting a repository",codeblock:{lang:"bash",code:`<span class="cmt"># Turn an existing folder into a Git repo</span>
<span class="hl">git init</span>
<span class="cmt"># Creates .git/ — Git now tracks this folder</span>

<span class="cmt"># Create AND init a new folder in one step</span>
<span class="hl">git init</span> my-project`}},
    {label:"git status",codeblock:{lang:"bash",code:`<span class="hl">git status</span>           <span class="cmt"># full output</span>
<span class="hl">git status</span> -s        <span class="cmt"># short format</span>
<span class="cmt"># ?? = untracked</span>
<span class="cmt"># A  = staged new file</span>
<span class="cmt">#  M = modified unstaged</span>
<span class="cmt"># M  = modified staged</span>`}},
    {label:"git add",codeblock:{lang:"bash",code:`<span class="hl">git add</span> README.md          <span class="cmt"># one file</span>
<span class="hl">git add</span> src/               <span class="cmt"># entire directory</span>
<span class="hl">git add</span> .                  <span class="cmt"># all changes</span>
<span class="hl">git add</span> -p                 <span class="cmt"># interactive chunks</span>
<span class="hl">git add</span> -A                 <span class="cmt"># everything incl. deletions</span>`}},
    {label:"git commit",codeblock:{lang:"bash",code:`<span class="hl">git commit</span> -m <span class="str">"Add user auth"</span>  <span class="cmt"># inline message</span>
<span class="hl">git commit</span>                    <span class="cmt"># opens editor</span>
<span class="hl">git commit</span> -am <span class="str">"Fix typo"</span>    <span class="cmt"># stage tracked + commit</span>`}},
    {label:"Writing great commit messages",cards:[
      {title:"The rules",body:"Use imperative mood: 'Fix bug' not 'Fixed bug'. Keep subject under 50 chars. No period at end. Explain <em>what</em> and <em>why</em> in the body, not <em>how</em>."},
      {title:"Good vs bad",body:"❌ <code>fixed stuff</code> &nbsp; ❌ <code>WIP</code> &nbsp; ❌ <code>asdf</code><br>✅ <code>Add password reset via email</code><br>✅ <code>Fix null pointer in user login</code>"}
    ]},
    {label:"git log & git diff",codeblock:{lang:"bash",code:`<span class="hl">git log</span>                    <span class="cmt"># full history</span>
<span class="hl">git log</span> --oneline          <span class="cmt"># compact</span>
<span class="hl">git log</span> --oneline --graph --all
<span class="hl">git show</span> HEAD              <span class="cmt"># inspect latest commit</span>
<span class="hl">git diff</span>                   <span class="cmt"># unstaged changes</span>
<span class="hl">git diff</span> --staged          <span class="cmt"># staged changes</span>`}}
  ],
  challenges:[
    {q:"Type the command to initialise a new Git repository in the current directory.",scenario:"You have a project folder with code in it. You want Git to start tracking it.",accept:["git init","git init ."],feedback:"git init creates the .git directory inside the current folder. From this point on, Git tracks all changes in this directory. It does not affect your existing files."},
    {q:"Type the command to stage ALL changes in the current directory for the next commit.",scenario:"You've edited 4 files and want to include all of them in one commit.",accept:["git add .","git add -a","git add -a ","git add --all","git add -a","git add -A"],feedback:"git add . stages all new and modified files in the current directory and subdirectories. git add -A also includes deletions across the whole working tree."},
    {q:"Type the command to commit your staged changes with the message 'Add homepage'.",scenario:"You have staged files ready. Write the exact commit command.",accept:["git commit -m \"add homepage\"","git commit -m 'add homepage'","git commit -m add homepage"],feedback:"git commit -m allows you to provide the commit message inline. Without -m, Git opens your configured editor so you can write a longer multi-line message."},
    {q:"Type the command to see a compact one-line-per-commit view of the entire history.",scenario:"You want a quick overview of all the commits in this repo without the full metadata.",accept:["git log --oneline","git log --oneline "],feedback:"git log --oneline shows each commit as: HASH Message. Combine with --graph --all for a visual branch diagram."}
  ]
},
{
  title:"Branching",sub:"Parallel development and the HEAD pointer",
  sections:[
    {label:"What is a branch, really?",cards:[
      {title:"A branch is just a pointer",body:"Internally, a branch is a file containing a 40-character commit hash. When you commit, the branch pointer moves forward automatically. Creating branches is instant and nearly free."},
      {title:"HEAD — you are here",body:"<code>HEAD</code> is a pointer to the branch you're currently on. When you switch branches, HEAD moves. In 'detached HEAD' state, HEAD points directly to a commit instead of a branch."}
    ]},
    {label:"Branch diagram",content:`<div class="diagram"><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text1);line-height:2.2">
<div><span style="color:var(--accent-blue)">A</span> ─── <span style="color:var(--accent-blue)">B</span> ─── <span style="color:var(--accent-blue)">C</span>  ← <span style="color:var(--accent-orange)">main</span></div>
<div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;└── <span style="color:var(--accent-purple)">D</span> ─── <span style="color:var(--accent-purple)">E</span>  ← <span style="color:var(--accent-purple)">feature-login</span>  ← <span style="color:var(--accent)">HEAD</span></div>
</div></div>`},
    {label:"Branch commands",codeblock:{lang:"bash",code:`<span class="hl">git branch</span>               <span class="cmt"># list branches</span>
<span class="hl">git branch</span> -a            <span class="cmt"># list including remotes</span>
<span class="hl">git branch</span> feature-x     <span class="cmt"># create (don't switch)</span>
<span class="hl">git switch</span> feature-x     <span class="cmt"># switch to branch</span>
<span class="hl">git switch</span> -c feature-x  <span class="cmt"># create AND switch</span>
<span class="hl">git branch</span> -d feature-x  <span class="cmt"># delete (if merged)</span>
<span class="hl">git branch</span> -D feature-x  <span class="cmt"># force delete</span>
<span class="hl">git branch</span> -v            <span class="cmt"># show commit each branch points to</span>`}},
    {label:"Best practices",cards:[
      {title:"Never commit directly to main",body:"main must always be stable and deployable. All work happens on feature branches."},
      {title:"Branch naming",body:"<code>feature/user-auth</code> &nbsp; <code>fix/login-bug</code> &nbsp; <code>hotfix/crash</code> &nbsp; <code>chore/deps</code>"}
    ]}
  ],
  challenges:[
    {q:"Type the single command to create a new branch called 'feature-nav' AND switch to it immediately.",scenario:"You're starting work on a new navigation feature. You want to do it all in one command.",accept:["git switch -c feature-nav","git checkout -b feature-nav"],feedback:"git switch -c is the modern way. The older git checkout -b still works. Both create the branch from your current position and switch HEAD to it immediately."},
    {q:"You are on 'feature-nav'. Type the command to switch back to 'main'.",scenario:"You're done working on the feature branch and need to return to the main branch.",accept:["git switch main","git checkout main"],feedback:"git switch main moves HEAD to point to the main branch. Your working directory updates to match the state of main's latest commit."},
    {q:"What is the name of the special Git pointer that always tells you which branch (or commit) you are currently on?",scenario:"Your team lead asks: 'What pointer tracks your current location in the Git graph?'",accept:["head","HEAD"],feedback:"HEAD is a pointer to your current position. Normally it points to a branch name (which points to a commit). In detached HEAD state, it points directly to a commit hash."},
    {q:"Type the command to list ALL branches including remote-tracking branches.",scenario:"You want to see both your local branches and all branches on the remote server.",accept:["git branch -a","git branch --all"],feedback:"git branch -a shows local branches and remote-tracking branches (shown as remotes/origin/main etc.). Use git branch for local only."}
  ]
},
{
  title:"Merging & Conflict Resolution",sub:"Bringing branches back together",
  sections:[
    {label:"Types of merge",cards:[
      {title:"Fast-forward merge",body:"When the target branch hasn't moved since the feature branch was created, Git just moves the pointer forward. No new commit. History stays linear."},
      {title:"Three-way merge",body:"When both branches have diverged, Git finds the common ancestor, combines changes, and creates a new merge commit with two parent pointers."}
    ]},
    {label:"Merge diagram",content:`<div class="diagram"><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text1);line-height:2.2">
<div style="color:var(--accent-orange)">Fast-Forward:</div>
<div>main: A ─── B</div>
<div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;└── C ─── D ← feature</div>
<div style="color:var(--text3)">After: main pointer moves to D. No merge commit.</div>
<div style="margin-top:10px;color:var(--accent-orange)">3-Way Merge:</div>
<div>main: A ─── B ─── C</div>
<div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;└── D ─── E ← feature</div>
<div>After: A ─── B ─── C ─── <span style="color:var(--accent-teal)">M</span> ← main</div>
<div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;└── D ─── E ─┘</div>
</div></div>`},
    {label:"Merge commands",codeblock:{lang:"bash",code:`<span class="hl">git switch</span> main
<span class="hl">git merge</span> feature-login      <span class="cmt"># merge into current branch</span>
<span class="hl">git merge</span> --no-ff feature-x  <span class="cmt"># force merge commit</span>
<span class="hl">git merge</span> --squash feature-x <span class="cmt"># squash into one commit</span>
<span class="hl">git merge</span> --abort            <span class="cmt"># bail out</span>`}},
    {label:"Resolving conflicts",codeblock:{lang:"text",code:`<span class="cmt"># Git inserts markers into conflicted files:</span>
<span class="hl">&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</span>
<span class="str">Your current branch's version</span>
<span class="hl">=======</span>
<span class="hl2">The incoming branch's version</span>
<span class="hl">&gt;&gt;&gt;&gt;&gt;&gt;&gt; feature-login</span>

<span class="cmt"># Edit the file, remove ALL markers, keep what you want</span>
<span class="cmt"># Then:</span>
<span class="hl">git add</span> conflicted-file.js
<span class="hl">git commit</span>   <span class="cmt"># Git pre-fills the merge message</span>`}}
  ],
  challenges:[
    {q:"You are on 'main'. Type the command to merge a branch called 'feature-payment' into main.",scenario:"The feature is complete and approved. You need to bring it into main.",accept:["git merge feature-payment"],feedback:"You always merge INTO your current branch. So switch to the target branch first, then run git merge <source-branch>. The source branch is not deleted automatically — you must delete it separately."},
    {q:"A merge has gone badly wrong mid-way through. Type the command to cancel it and return to the state before you started the merge.",scenario:"You started merging but the conflicts are too complex and you want to start fresh.",accept:["git merge --abort"],feedback:"git merge --abort cancels the in-progress merge and restores your working directory to the state it was in before you ran git merge. It only works while a merge is in progress."},
    {q:"After manually resolving a conflict in 'app.js', what are the two commands you run to complete the merge? Separate them with a semicolon.",scenario:"You've edited the conflict markers out of app.js. What do you do next to finish the merge?",accept:["git add app.js; git commit","git add app.js;git commit","git add app.js ; git commit","git add .; git commit"],feedback:"First git add to mark the conflict as resolved (staging the fixed file), then git commit to finalise the merge. Git pre-fills the commit message with merge information."}
  ]
},
{
  title:"Remote Repositories",sub:"GitHub, push, pull, clone, fetch",
  sections:[
    {label:"Local vs remote",content:`<div class="diagram"><div class="diagram-flex">
<div class="d-node orange"><div class="d-label">Your machine</div><div class="d-name">Local repo</div></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 12px"><div style="font-size:10px;color:var(--accent-blue);font-family:'JetBrains Mono',monospace">git push</div><div style="color:var(--text3);font-size:20px">⇄</div><div style="font-size:10px;color:var(--accent-purple);font-family:'JetBrains Mono',monospace">git pull</div></div>
<div class="d-node accent"><div class="d-label">GitHub / GitLab</div><div class="d-name">Remote repo</div><div class="d-cmd">origin</div></div>
</div></div>`,cards:[
      {title:"origin",body:"The default remote name. Just an alias for the remote URL. Created automatically when you clone."},
      {title:"Remote-tracking branches",body:"After fetch, Git creates local read-only refs like <code>origin/main</code> showing where remote branches are."}
    ]},
    {label:"Remote commands",codeblock:{lang:"bash",code:`<span class="hl">git remote add</span> origin URL        <span class="cmt"># connect a remote</span>
<span class="hl">git remote</span> -v                     <span class="cmt"># list remotes</span>
<span class="hl">git clone</span> URL                     <span class="cmt"># download + setup</span>
<span class="hl">git push</span> -u origin main           <span class="cmt"># first push + set upstream</span>
<span class="hl">git push</span>                          <span class="cmt"># subsequent pushes</span>
<span class="hl">git fetch</span>                         <span class="cmt"># download, don't merge</span>
<span class="hl">git pull</span>                          <span class="cmt"># fetch + merge</span>
<span class="hl">git pull</span> --rebase                 <span class="cmt"># fetch + rebase (cleaner)</span>`}},
    {label:"fetch vs pull",cards:[
      {title:"git fetch — look before you leap",body:"Downloads remote changes but does NOT change your working directory or current branch. Safe. Inspect first, integrate when ready."},
      {title:"git pull — fetch + merge",body:"Downloads and immediately merges. Convenient but can create unexpected merge commits. Use <code>git pull --rebase</code> for linear history."}
    ]}
  ],
  challenges:[
    {q:"Type the command to add a remote named 'origin' pointing to 'https://github.com/user/repo.git'.",scenario:"You have a local repo and just created an empty repo on GitHub. Connect them.",accept:["git remote add origin https://github.com/user/repo.git"],feedback:"git remote add creates an alias (origin) for the remote URL. After this, you can push/pull without typing the full URL every time."},
    {q:"Type the full command to push your 'main' branch to origin for the very first time AND set it as the default upstream.",scenario:"First push ever. You want future 'git push' commands to know where to go without specifying explicitly.",accept:["git push -u origin main","git push --set-upstream origin main","git push --set-upstream-to origin main"],feedback:"The -u flag (short for --set-upstream) creates a tracking relationship between your local main and origin/main. After this, just git push or git pull works without arguments."},
    {q:"What is the difference between git fetch and git pull? Answer in one sentence.",scenario:"A teammate asks you to explain the difference clearly.",accept:["fetch downloads without merging, pull downloads and merges","fetch downloads changes without merging them, pull fetches and merges","fetch gets changes without merging, pull fetches and merges automatically","fetch downloads remote changes but does not merge, pull fetches and then merges","git fetch downloads without merging git pull fetches and merges"],feedback:"Correct. git fetch is the safe operation — it updates your remote-tracking branches (origin/main) but leaves your local branches untouched. git pull = git fetch + git merge (or rebase with --rebase)."}
  ]
},
{
  title:"Undoing Changes",sub:"restore, revert, reset, reflog — getting out of trouble",
  sections:[
    {label:"The undo toolkit",content:`<div class="diagram"><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);line-height:2.1">
<div><span style="color:var(--accent-orange)">git restore file</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→ discard working dir changes (irreversible)</div>
<div><span style="color:var(--accent-orange)">git restore --staged</span>&nbsp;&nbsp;→ unstage without losing changes</div>
<div><span style="color:var(--accent-blue)">git commit --amend</span>&nbsp;&nbsp;&nbsp;→ fix the LAST commit (before push only)</div>
<div><span style="color:var(--accent)">git revert HEAD</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→ safe undo (adds new commit)</div>
<div><span style="color:var(--accent-red)">git reset --soft</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→ undo commit, keep staged</div>
<div><span style="color:var(--accent-red)">git reset --mixed</span>&nbsp;&nbsp;&nbsp;&nbsp;→ undo commit, unstage</div>
<div><span style="color:var(--accent-red)">git reset --hard</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→ undo commit, DELETE ⚠️</div>
</div></div>`},
    {label:"restore, amend, revert",codeblock:{lang:"bash",code:`<span class="hl">git restore</span> app.js             <span class="cmt"># discard working dir changes</span>
<span class="hl">git restore</span> --staged app.js    <span class="cmt"># unstage a file</span>
<span class="hl">git commit</span> --amend -m <span class="str">"Fix"</span>   <span class="cmt"># fix last commit msg</span>
<span class="hl">git revert</span> HEAD                <span class="cmt"># safe undo via new commit</span>
<span class="hl">git revert</span> a1b2c3d             <span class="cmt"># revert any commit by hash</span>`}},
    {label:"git reset",codeblock:{lang:"bash",code:`<span class="hl">git reset</span> --soft HEAD~1    <span class="cmt"># keep staged</span>
<span class="hl">git reset</span> HEAD~1           <span class="cmt"># keep in working dir (default)</span>
<span class="hl">git reset</span> --hard HEAD~1   <span class="cmt"># ⚠️ DELETE everything</span>`}},
    {label:"git reflog — the safety net",codeblock:{lang:"bash",code:`<span class="hl">git reflog</span>
<span class="cmt"># HEAD@{0}: reset: moving to HEAD~1</span>
<span class="cmt"># HEAD@{1}: commit: Feature you 'lost'  ← recover this!</span>
<span class="hl">git reset</span> --hard HEAD@{1}   <span class="cmt"># restore to lost commit</span>
<span class="hl">git switch</span> -c recovered HEAD@{1}  <span class="cmt"># or branch from it</span>`}}
  ],
  challenges:[
    {q:"A bad commit was pushed to the shared main branch. What is the safest command to undo it without rewriting history?",scenario:"5 teammates have already pulled this commit. You cannot use reset. What do you use?",accept:["git revert head","git revert HEAD","git revert HEAD~0"],feedback:"git revert creates a NEW commit that undoes the changes of the target commit. History is preserved — safe for shared branches. Never use git reset --hard on commits others have already pulled."},
    {q:"Type the command to undo the last commit but keep all its changes ready in the staging area.",scenario:"You committed too soon and want to add one more file to the same commit.",accept:["git reset --soft head~1","git reset --soft HEAD~1","git reset --soft head~1 "],feedback:"git reset --soft HEAD~1 moves the branch pointer back by one commit but leaves all the changes staged. You can then stage additional files and commit everything together."},
    {q:"You ran git reset --hard and seem to have lost 3 commits. What command do you run FIRST to find those lost commits?",scenario:"Panic. Your work seems gone. What is your immediate next command?",accept:["git reflog","git reflog ","git reflog show"],feedback:"git reflog records every single movement of HEAD — including commits that appear deleted. You'll see HEAD@{N} entries for each past state. Find the hash you need and git reset --hard to it or branch from it."}
  ]
},
{
  title:"Stashing",sub:"Shelving work-in-progress without committing",
  sections:[
    {label:"What is stashing?",cards:[
      {title:"The problem it solves",body:"You're halfway through a feature when a critical bug is reported. You can't commit half-done work. <code>git stash</code> saves your WIP to a temporary stack and restores a clean working directory."},
      {title:"The stash stack",body:"LIFO (last in, first out). Most recent is <code>stash@{0}</code>, next is <code>stash@{1}</code>, etc. You can have multiple stashes."}
    ]},
    {label:"Stash commands",codeblock:{lang:"bash",code:`<span class="hl">git stash</span>                          <span class="cmt"># save WIP (tracked files)</span>
<span class="hl">git stash</span> -u                       <span class="cmt"># include untracked files</span>
<span class="hl">git stash push</span> -m <span class="str">"half-done form"</span>  <span class="cmt"># named stash</span>
<span class="hl">git stash list</span>                     <span class="cmt"># see all stashes</span>
<span class="hl">git stash show</span> -p                  <span class="cmt"># full diff of latest stash</span>
<span class="hl">git stash pop</span>                      <span class="cmt"># restore + DELETE stash</span>
<span class="hl">git stash apply</span>                    <span class="cmt"># restore + KEEP stash</span>
<span class="hl">git stash apply</span> stash@{2}          <span class="cmt"># restore specific stash</span>
<span class="hl">git stash drop</span>                     <span class="cmt"># delete latest</span>
<span class="hl">git stash clear</span>                    <span class="cmt"># delete ALL stashes</span>`}},
    {label:"pop vs apply",cards:[
      {title:"git stash pop",body:"Restores the stash AND removes it from the list. Use when you're done with it."},
      {title:"git stash apply",body:"Restores the stash but KEEPS it in the list. Useful for applying the same stash to multiple branches."}
    ]}
  ],
  challenges:[
    {q:"Type the command to save your current work-in-progress to the stash with the label 'login form half done'.",scenario:"You need to urgently switch branches but aren't ready to commit your current changes.",accept:["git stash push -m \"login form half done\"","git stash push -m 'login form half done'","git stash save \"login form half done\"","git stash save 'login form half done'"],feedback:"git stash push -m 'message' creates a named stash. Named stashes are much easier to identify later when you have multiple stashes. git stash save is the older deprecated syntax."},
    {q:"Type the command to restore your most recent stash AND remove it from the stash list.",scenario:"You're back on your feature branch and want to continue where you left off.",accept:["git stash pop","git stash pop "],feedback:"git stash pop is the most commonly used stash command. It applies the top stash and removes it from the stack. If you want to keep it in the list (to apply to other branches), use git stash apply instead."},
    {q:"Type the command to see a full diff of what is inside your most recent stash.",scenario:"You have 3 stashes and can't remember what's in the latest one. You want to see the actual changes.",accept:["git stash show -p","git stash show --patch","git stash show -p stash@{0}"],feedback:"git stash show -p (patch) shows the full diff of the stash. Without -p, it shows a summary of which files changed. Add stash@{N} to inspect a specific stash."}
  ]
},
{
  title:"Rebasing",sub:"Rewriting history for a cleaner timeline",
  sections:[
    {label:"Rebase vs merge",cards:[
      {title:"Merge — preserves history",body:"Creates a merge commit. Shows exactly when branches diverged and integrated. History is accurate but can look complex."},
      {title:"Rebase — linearises history",body:"Replays your commits on top of another branch. History appears linear and clean. Commit hashes change (history is rewritten)."}
    ]},
    {label:"Rebase diagram",content:`<div class="diagram"><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text1);line-height:2.2">
<div style="color:var(--text3)">Before (feature branched at B):</div>
<div>main:    A ─── B ─── C ─── D</div>
<div>feature:         └── E ─── F ← HEAD</div>
<div style="margin-top:8px;color:var(--text3)">After: git switch feature && git rebase main</div>
<div>main:    A ─── B ─── C ─── D</div>
<div>feature:                   └── <span style="color:var(--accent)">E' ─── F'</span> ← HEAD</div>
<div style="margin-top:4px;font-size:11px;color:var(--text3)">E' and F' are new commits with same changes but new hashes</div>
</div></div>`},
    {label:"Basic rebase",codeblock:{lang:"bash",code:`<span class="hl">git switch</span> feature-login
<span class="hl">git rebase</span> main           <span class="cmt"># reapply commits on top of main</span>
<span class="cmt"># If conflict: resolve → git add → git rebase --continue</span>
<span class="hl">git rebase</span> --abort        <span class="cmt"># bail out entirely</span>

<span class="cmt"># Then merge back (will be fast-forward)</span>
<span class="hl">git switch</span> main
<span class="hl">git merge</span> feature-login</span>`}},
    {label:"Interactive rebase",codeblock:{lang:"bash",code:`<span class="hl">git rebase</span> -i HEAD~4      <span class="cmt"># edit last 4 commits</span>
<span class="cmt"># Commands in the editor:</span>
<span class="hl">pick</span>   = keep as-is
<span class="hl2">reword</span> = keep, change message
<span class="hl3">edit</span>   = pause to amend
<span class="hl">squash</span> = combine with previous (merge messages)
<span class="hl">fixup</span>  = combine with previous (discard message)
<span class="err">drop</span>   = delete this commit`}},
    {label:"Golden rule",content:`<div class="danger"><div class="callout-icon">⚠️</div><div>Never rebase commits that have been pushed to a shared remote. Rebasing rewrites hashes — if teammates have pulled those commits, their history diverges and causes chaos. Only rebase local, un-pushed feature branches.</div></div>`}
  ],
  challenges:[
    {q:"You are on 'feature-x'. Type the command to rebase it onto 'main'.",scenario:"Your feature branch is 10 commits behind main. You want to replay your work on top of main's latest state.",accept:["git rebase main","git rebase main "],feedback:"git rebase main replays all commits on your current branch on top of main's latest commit. Your commits get new hashes. Any conflicts must be resolved one commit at a time using git rebase --continue."},
    {q:"Type the command to open an interactive rebase session to edit the last 5 commits.",scenario:"You have 5 WIP commits you want to squash into a single clean commit before opening a PR.",accept:["git rebase -i head~5","git rebase -i HEAD~5","git rebase --interactive HEAD~5","git rebase --interactive head~5"],feedback:"git rebase -i HEAD~5 opens your editor showing the last 5 commits with 'pick' in front of each. Change 'pick' to 'squash' or 'fixup' on the ones you want to combine into the first."},
    {q:"During a rebase, a conflict occurs. After resolving the conflict in the file and staging it, what command continues the rebase?",scenario:"You resolved the conflict in app.js and ran git add app.js. What comes next?",accept:["git rebase --continue","git rebase --continue "],feedback:"git rebase --continue tells Git to proceed to the next commit in the rebase sequence. If another conflict occurs, resolve it and continue again. If you want to abandon everything, run git rebase --abort."}
  ]
},
{
  title:"Advanced Git Commands",sub:"cherry-pick, bisect, blame, reflog",
  sections:[
    {label:"git cherry-pick",codeblock:{lang:"bash",code:`<span class="cmt"># Apply a specific commit to the current branch</span>
<span class="hl">git cherry-pick</span> a1b2c3d
<span class="hl">git cherry-pick</span> a1b2c3d..f4g5h6i  <span class="cmt"># range</span>
<span class="hl">git cherry-pick</span> --no-commit a1b2c3d  <span class="cmt"># apply without committing</span>
<span class="hl">git cherry-pick</span> --abort`}},
    {label:"git bisect — find the bug",codeblock:{lang:"bash",code:`<span class="hl">git bisect start</span>
<span class="hl">git bisect bad</span>               <span class="cmt"># current = has the bug</span>
<span class="hl">git bisect good</span> v1.0.0       <span class="cmt"># this tag = was fine</span>
<span class="cmt"># Git checks out midpoint. Test, then:</span>
<span class="hl">git bisect good</span>              <span class="cmt"># or: git bisect bad</span>
<span class="cmt"># Repeat until: "first bad commit is..."</span>
<span class="hl">git bisect reset</span>             <span class="cmt"># return to HEAD</span>
<span class="cmt"># Automate with a test script:</span>
<span class="hl">git bisect run</span> npm test`}},
    {label:"git blame & git grep",codeblock:{lang:"bash",code:`<span class="hl">git blame</span> app.js             <span class="cmt"># who changed each line</span>
<span class="hl">git blame</span> -L 10,25 app.js   <span class="cmt"># specific line range</span>
<span class="hl">git grep</span> <span class="str">"TODO"</span>             <span class="cmt"># search all tracked files</span>
<span class="hl">git log</span> -S <span class="str">"functionName"</span>  <span class="cmt"># find when string was added/removed</span>
<span class="hl">git shortlog</span> -sn            <span class="cmt"># commit count per author</span>`}}
  ],
  challenges:[
    {q:"A critical bug fix was made on 'feature-urgent' with hash 'f9e8d7c'. You need it on 'main' NOW without merging the whole branch. Type the exact command.",scenario:"The feature branch isn't ready, but one specific commit on it fixes a production crash.",accept:["git cherry-pick f9e8d7c","git cherry-pick f9e8d7c "],feedback:"git cherry-pick applies a specific commit's changes to your current branch as a new commit. The new commit has a different hash but the same code changes. Perfect for hotfixes or backporting."},
    {q:"Type the first three commands of a bisect session, in order separated by newlines. Mark the current commit as bad and tag 'v2.0' as the last known good commit.",scenario:"A bug exists now that didn't exist at v2.0. You need to find which commit introduced it.",accept:["git bisect start\ngit bisect bad\ngit bisect good v2.0","git bisect start\ngit bisect bad \ngit bisect good v2.0"],feedback:"The three-command bisect start sequence: (1) git bisect start to begin, (2) git bisect bad to mark current as broken, (3) git bisect good TAG to mark the last known-good point. Git then binary searches between them."},
    {q:"Type the command to search all tracked files in the current repository for the string 'API_KEY'.",scenario:"You suspect a secret was accidentally committed somewhere in the codebase.",accept:["git grep \"api_key\"","git grep 'api_key'","git grep api_key","git grep \"API_KEY\"","git grep 'API_KEY'","git grep API_KEY"],feedback:"git grep searches the contents of all tracked files — much faster than a regular grep because it only searches files Git knows about. Use it to find TODOs, secrets, function names, or any string across the whole codebase."}
  ]
},
{
  title:"Tags & Releases",sub:"Marking versions and creating release points",
  sections:[
    {label:"What are tags?",cards:[
      {title:"Tags mark release points",body:"A tag is like a branch that never moves. A permanent label on a specific commit. Used for release versions: <code>v1.0.0</code>, <code>v2.1.3</code>."},
      {title:"Semantic Versioning",body:"<code>MAJOR.MINOR.PATCH</code> — major for breaking changes, minor for new features, patch for bug fixes. Example: <code>v2.1.3</code>."}
    ]},
    {label:"Tag commands",codeblock:{lang:"bash",code:`<span class="cmt">── CREATING ──────────────────────────────────────</span>
<span class="hl">git tag</span> v1.0.0                       <span class="cmt"># lightweight</span>
<span class="hl">git tag</span> -a v1.0.0 -m <span class="str">"Release 1.0"</span>  <span class="cmt"># annotated (preferred)</span>
<span class="hl">git tag</span> -a v0.9.0 -m <span class="str">"Beta"</span> a1b2c3d  <span class="cmt"># tag past commit</span>
<span class="cmt">── LISTING / INSPECTING ──────────────────────────</span>
<span class="hl">git tag</span>                              <span class="cmt"># list all</span>
<span class="hl">git show</span> v1.0.0                      <span class="cmt"># inspect tag</span>
<span class="hl">git describe</span>                         <span class="cmt"># nearest tag + offset</span>
<span class="cmt">── PUSHING / DELETING ────────────────────────────</span>
<span class="hl">git push</span> origin v1.0.0              <span class="cmt"># push one tag</span>
<span class="hl">git push</span> origin --tags              <span class="cmt"># push all tags</span>
<span class="hl">git tag</span> -d v1.0.0                   <span class="cmt"># delete local</span>
<span class="hl">git push</span> origin --delete v1.0.0    <span class="cmt"># delete remote</span>`}}
  ],
  challenges:[
    {q:"Type the command to create an annotated tag called 'v3.0.0' with the message 'Major rewrite'.",scenario:"You just finished a major version of your software and want to permanently mark this commit.",accept:["git tag -a v3.0.0 -m \"major rewrite\"","git tag -a v3.0.0 -m 'major rewrite'","git tag --annotate v3.0.0 -m \"major rewrite\"","git tag --annotate v3.0.0 -m 'major rewrite'"],feedback:"Annotated tags (-a) are stored as full Git objects with tagger name, date, and message. They can also be signed with GPG. Lightweight tags (without -a -m) are just pointers with no extra metadata — not suitable for public releases."},
    {q:"Type the command to push ALL local tags to the 'origin' remote.",scenario:"You've created 3 tags locally and want them all to appear on GitHub.",accept:["git push origin --tags","git push --tags","git push origin --tags "],feedback:"By default, git push does NOT push tags. You must explicitly push them with --tags (all annotated+lightweight) or --follow-tags (annotated only). Individually push a tag with git push origin v1.0.0."},
    {q:"What is the difference between a lightweight tag and an annotated tag? Answer in one sentence.",scenario:"Your team asks why you should always use annotated tags for releases.",accept:["lightweight is just a pointer to a commit, annotated stores extra metadata like author date and message","lightweight is just a commit hash, annotated has author date and message","lightweight has no metadata, annotated stores tagger name date and message","annotated tags store extra data like tagger date and message, lightweight tags are just pointers"],feedback:"Correct. Annotated tags are full Git objects with tagger name, email, date, and message. They can be signed. Lightweight tags are just a name pointing to a commit hash with no extra information."}
  ]
},
{
  title:".gitignore & Configuration",sub:"Telling Git what to ignore, and customising your setup",
  sections:[
    {label:"What .gitignore does",cards:[
      {title:"Files to never commit",body:"Compiled binaries, <code>node_modules/</code>, secrets (<code>.env</code>), editor files (<code>.idea/</code>), OS files (<code>.DS_Store</code>). The .gitignore file tells Git to pretend they don't exist."},
      {title:"Critical: already tracked files",body:"gitignore only prevents <em>untracked</em> files from being added. If a file is already committed, .gitignore does nothing. Run <code>git rm --cached filename</code> to stop tracking it."}
    ]},
    {label:"gitignore patterns",codeblock:{lang:"text",code:`*.log              <span class="cmt"># all .log files anywhere</span>
node_modules/      <span class="cmt"># entire directory</span>
.env               <span class="cmt"># exact filename</span>
dist/              <span class="cmt"># build output</span>
**/.DS_Store       <span class="cmt"># in any subdirectory</span>
*.pyc              <span class="cmt"># Python compiled</span>
*.class            <span class="cmt"># Java compiled</span>
coverage/          <span class="cmt"># test coverage</span>
!important.log     <span class="cmt"># un-ignore a specific file</span>`}},
    {label:"Stop tracking a committed file",codeblock:{lang:"bash",code:`<span class="cmt"># Remove from tracking WITHOUT deleting from disk</span>
<span class="hl">git rm</span> --cached .env
<span class="hl">git commit</span> -m <span class="str">"Remove .env from tracking"</span>
<span class="cmt"># Now add .env to .gitignore</span>
<span class="cmt"># Check if a file is ignored:</span>
<span class="hl">git check-ignore</span> -v filename`}}
  ],
  challenges:[
    {q:"You accidentally committed 'secrets.env'. Type the command to stop Git from tracking it WITHOUT deleting the file from your disk.",scenario:"The file must stay on your machine for your app to work, but it must never appear in the repo again.",accept:["git rm --cached secrets.env","git rm --cached secrets.env "],feedback:"git rm --cached removes the file from Git's index (tracking) but leaves it on disk. After this, add secrets.env to your .gitignore and commit. Note: the file still exists in your old commits — for true removal use git filter-branch or BFG Repo Cleaner."},
    {q:"What single pattern would you add to .gitignore to ignore ALL files with a .log extension anywhere in the project?",scenario:"Your app generates log files in various subdirectories. You want all of them ignored.",accept:["*.log"],feedback:"*.log matches any file ending in .log in any directory. The ** prefix is not needed here — a pattern without a slash matches anywhere in the tree. Use **/*.log if you specifically want to match in subdirectories only."},
    {q:"You want to ignore all .txt files but keep one specific file called 'IMPORTANT.txt'. Write the two .gitignore lines needed, separated by a newline.",scenario:"You need a rule to block .txt files but an exception for one specific file.",accept:["*.txt\n!important.txt","*.txt\n!IMPORTANT.txt","*.txt\n! important.txt","*.txt\n!./important.txt"],feedback:"The ! prefix negates a pattern. Git processes .gitignore top-to-bottom: *.txt ignores all .txt files, then !IMPORTANT.txt un-ignores that one specific file. The negation must come AFTER the ignore rule."}
  ]
},
{
  title:"Git Workflows",sub:"GitFlow, GitHub Flow, and Trunk-Based Development",
  sections:[
    {label:"Why workflows matter",cards:[
      {title:"Social contracts",body:"Git is flexible — it lets you do almost anything. But a team without an agreed workflow creates chaos. Workflows are rules everyone follows so the shared history stays clean and deployable."}
    ]},
    {label:"1. Git Flow",cards:[
      {title:"5 branch types",body:"<code>main</code> — production only. <code>develop</code> — integration. <code>feature/*</code> — new features from develop. <code>release/*</code> — release prep. <code>hotfix/*</code> — urgent fixes from main, merged to both main and develop."},
      {title:"Best for",body:"Versioned software with scheduled releases. Libraries, mobile apps, enterprise software where multiple versions are in production."}
    ]},
    {label:"2. GitHub Flow",cards:[
      {title:"6-step cycle",body:"Branch from main → Commit → Push → Open PR → Review → Merge to main → Deploy. That's it. Only two types: main and feature branches."},
      {title:"Best for",body:"Continuous deployment. Web apps, SaaS, APIs. Most startups. Teams that deploy multiple times per day."}
    ]},
    {label:"3. Trunk-Based Development",cards:[
      {title:"Everyone integrates daily",body:"All developers commit to main (the trunk) at least once a day. Feature flags hide incomplete work. No long-lived branches. Requires strong automated testing."},
      {title:"Best for",body:"Large orgs with robust CI/CD (Google, Meta, Netflix). Not beginner-friendly. Requires high test coverage."}
    ]},
    {label:"Conventional Commits",codeblock:{lang:"text",code:`<span class="hl">feat</span>: add dark mode toggle
<span class="hl">fix</span>(auth): resolve JWT expiry bug
<span class="hl">docs</span>: update API reference
<span class="hl">refactor</span>: extract payment service
<span class="hl">test</span>: add coverage for login flow
<span class="hl">chore</span>: update dependencies
<span class="hl">feat!</span>: redesign auth API   <span class="cmt"># ! = breaking change</span>`}}
  ],
  challenges:[
    {q:"In GitHub Flow, what is the ONLY long-lived branch that always reflects production-ready code?",scenario:"Your team wants to adopt GitHub Flow. What is the one sacred branch you never commit to directly?",accept:["main","master"],feedback:"In GitHub Flow, main is the only permanent branch and it must always be deployable. All work happens in short-lived feature branches that are merged to main via Pull Request. After merge, deploy immediately."},
    {q:"What Conventional Commits type prefix do you use for a commit that adds a completely new feature?",scenario:"You just built a new search feature. What prefix goes at the start of your commit message?",accept:["feat","feat:"],feedback:"feat: is for new features. fix: for bug fixes, docs: for documentation, refactor: for code restructuring with no behaviour change, chore: for maintenance tasks. feat! or adding BREAKING CHANGE in the body signals a breaking API change."},
    {q:"In Git Flow, if you need to make an urgent fix to the production code, what type of branch do you create and where do you branch it FROM?",scenario:"The production site is down. You need to fix it immediately without going through the develop branch.",accept:["hotfix branch from main","a hotfix branch from main","hotfix from main","create a hotfix branch from main","hotfix branched from main"],feedback:"In Git Flow, hotfix/* branches are always branched FROM main (the production branch), never from develop. After the fix, the hotfix branch is merged into BOTH main (to fix production) and develop (to keep it in sync)."}
  ]
},
{
  title:"Collaboration & Code Review",sub:"Forking, pull requests, and open source",
  sections:[
    {label:"Fork vs clone",cards:[
      {title:"Clone",body:"Creates a local copy. You need write access to push back. Used when you're a direct team collaborator."},
      {title:"Fork",body:"Copies a repo under YOUR GitHub account. Full write access to your copy. Open a PR to contribute back. Used in open source — no write access to original needed."}
    ]},
    {label:"Fork workflow",codeblock:{lang:"bash",code:`<span class="cmt"># Clone YOUR fork</span>
<span class="hl">git clone</span> git@github.com:YOU/repo.git
cd repo

<span class="cmt"># Add the original as 'upstream'</span>
<span class="hl">git remote add</span> upstream git@github.com:ORIGINAL/repo.git

<span class="cmt"># Keep fork synced</span>
<span class="hl">git fetch</span> upstream
<span class="hl">git switch</span> main
<span class="hl">git merge</span> upstream/main
<span class="hl">git push</span> origin main

<span class="cmt"># Work on feature, push to YOUR fork</span>
<span class="hl">git switch</span> -c fix/my-fix
<span class="cmt"># ... commit ... push origin fix/my-fix ...</span>
<span class="cmt"># Then open PR: your fork → original repo</span>`}},
    {label:"Anatomy of a great PR",cards:[
      {title:"PR description must include",body:"What it does, why it's needed (link to issue), how to test it, screenshots for UI changes, checklist: tests added, docs updated, no breaking changes."},
      {title:"Keep PRs small",body:"Ideal: 200-400 lines of code change. Large PRs get shallow reviews. Break big features into stacked smaller PRs."}
    ]},
    {label:"Code review etiquette",cards:[
      {title:"As a reviewer",body:"Review within 24h. Critique code not person. Prefix style opinions with <code>nit:</code>. Ask questions rather than commands."},
      {title:"As an author",body:"Respond to every comment. Don't take it personally. Explain reasoning if you disagree. Make changes in new commits during review."}
    ]}
  ],
  challenges:[
    {q:"After forking a repo, you cloned your fork locally. What remote name should you give to the ORIGINAL repository?",scenario:"You want to be able to pull future changes from the original project into your fork.",accept:["upstream"],feedback:"By universal convention, the original repo you forked from is added as a remote called 'upstream'. Your fork is 'origin'. This naming lets you: git fetch upstream to get original's changes, then merge them into your local main."},
    {q:"Type the command to fetch all branches and commits from the 'upstream' remote.",scenario:"The original project has had 20 new commits since you forked. You need to download them.",accept:["git fetch upstream","git fetch upstream "],feedback:"git fetch upstream downloads all new commits and branches from the upstream remote into your local upstream/* tracking branches (e.g. upstream/main). It does NOT merge them into your local branches — you do that separately."},
    {q:"After fetching from upstream, type the two commands (separated by newline) to merge upstream's main into your local main branch.",scenario:"You've fetched. Now you need to actually update your local main with upstream's changes.",accept:["git switch main\ngit merge upstream/main","git checkout main\ngit merge upstream/main","git switch main\ngit merge upstream/main "],feedback:"First switch to your local main, then merge the remote-tracking branch upstream/main into it. This brings your fork's main up to date with the original. Then git push origin main to update your GitHub fork."}
  ]
},

    {q:"Type the command that shows a full history of every position HEAD has ever been — including commits that appear to have been deleted.",scenario:"You've been working all day and accidentally reset --hard to the wrong commit. What command reveals your escape route?",accept:["git reflog","git reflog ","git reflog show"],feedback:"git reflog is the ultimate safety net. Every commit, branch switch, reset, merge, and rebase is logged here. Entries expire after ~90 days. Always run this first when you think you've lost work."},
