{
  title:"Git Internals",sub:"Blobs, trees, commits, refs — how Git actually works under the hood",
  sections:[
    {label:"Git is a content-addressable filesystem",cards:[
      {title:"Everything is an object",body:"At its core, Git stores everything as objects in the <code>.git/objects</code> directory. Every file, every directory snapshot, every commit — each becomes a compressed, SHA-1-hashed object. The same content always produces the same hash — Git never stores duplicates."},
      {title:"Four object types",body:"<strong style='font-weight:500'>blob</strong> — stores file content (no filename). <strong style='font-weight:500'>tree</strong> — stores a directory listing (filenames + blob/tree pointers). <strong style='font-weight:500'>commit</strong> — stores a tree pointer + parent pointer + author + message. <strong style='font-weight:500'>tag</strong> — stores a pointer to another object with metadata."}
    ]},
    {label:"The object model",content:`<div class="diagram"><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text1);line-height:2">
<div><span style="color:var(--accent-purple)">commit a1b2c3</span> → tree <span style="color:var(--accent-orange)">f4e5d6</span> → tree <span style="color:var(--accent-blue)">src/</span> → blob <span style="color:var(--accent)">index.js content</span></div>
<div style="margin-left:120px">→ blob <span style="color:var(--accent)">README.md content</span></div>
<div><span style="color:var(--text3)">parent ↑</span></div>
<div><span style="color:var(--accent-purple)">commit 9i8h7g</span> → tree <span style="color:var(--accent-orange)">prev snapshot...</span></div>
</div></div>`},
    {label:"Inspecting objects directly",codeblock:{lang:"bash",code:`<span class="cmt"># Inspect any object by its hash</span>
<span class="hl">git cat-file</span> -t HEAD          <span class="cmt"># type: commit</span>
<span class="hl">git cat-file</span> -p HEAD          <span class="cmt"># print the commit object</span>
<span class="hl">git cat-file</span> -p HEAD^{tree}   <span class="cmt"># print the root tree</span>
<span class="hl">git cat-file</span> -p a1b2c3d       <span class="cmt"># any hash</span>

<span class="cmt"># Write a blob directly (plumbing command)</span>
<span class="hl">echo</span> <span class="str">"hello"</span> | <span class="hl">git hash-object</span> --stdin
<span class="cmt"># → ce013625030ba8dba906f756967f9e9ca394464a</span>
<span class="hl">echo</span> <span class="str">"hello"</span> | <span class="hl">git hash-object</span> -w --stdin
<span class="cmt"># -w actually writes it to .git/objects</span>

<span class="cmt"># List all objects in the repo</span>
<span class="hl">git cat-file</span> --batch-all-objects --batch-check</span>

<span class="cmt"># See how an object is stored on disk</span>
ls .git/objects/ce/013625030ba8dba906f756967f9e9ca394464a</span>`}},
    {label:"Refs — human-readable pointers",codeblock:{lang:"bash",code:`<span class="cmt"># Refs are files in .git/refs/ containing a commit hash</span>
cat .git/refs/heads/main        <span class="cmt"># → a1b2c3d...</span>
cat .git/HEAD                   <span class="cmt"># → ref: refs/heads/main</span>
cat .git/refs/remotes/origin/main

<span class="cmt"># Symbolic refs (like HEAD) point to other refs</span>
<span class="hl">git symbolic-ref</span> HEAD           <span class="cmt"># → refs/heads/main</span>

<span class="cmt"># Packed refs — for repos with many refs</span>
cat .git/packed-refs</span>

<span class="cmt"># Resolve any ref to its commit hash</span>
<span class="hl">git rev-parse</span> HEAD
<span class="hl">git rev-parse</span> main
<span class="hl">git rev-parse</span> v1.0.0</span>`}},
    {label:"Packfiles — compression at scale",cards:[
      {title:"Loose objects vs packfiles",body:"Initially, each object is stored as a separate file (loose). When there are too many, Git runs <code>git gc</code> which packs them into a single <code>.pack</code> file with a <code>.idx</code> index. Packfiles use delta compression — storing only the differences between similar objects."},
      {title:"Why this matters",body:"Understanding packfiles explains why Git repos are small despite storing complete history, why <code>git clone</code> is fast, and how <code>git gc</code> optimises repo size. Run <code>git count-objects -vH</code> to see loose vs packed object counts."}
    ]}
  ],
  challenges:[
    {q:"What are the four types of Git objects?",scenario:"Your team lead asks you to explain what Git actually stores internally. Name all four types separated by commas.",accept:["blob, tree, commit, tag","blob,tree,commit,tag","blob tree commit tag","commit, tree, blob, tag","tree, blob, commit, tag"],feedback:"The four Git object types: blob (file content), tree (directory listing), commit (snapshot metadata + parent pointer), tag (annotated pointer to another object). Everything in Git is built from these four primitives."},
    {q:"Type the command to print the full contents of the HEAD commit object.",scenario:"You want to inspect exactly what data Git stores inside a commit — the tree hash, parent, author, and message.",accept:["git cat-file -p head","git cat-file -p HEAD","git cat-file --pretty head","git cat-file --pretty HEAD"],feedback:"git cat-file -p pretty-prints any Git object. On a commit you'll see: tree HASH, parent HASH, author name/email/timestamp, committer name/email/timestamp, and the commit message. This is the raw data Git stores."},
    {q:"Type the command to resolve the symbolic name 'main' to its full 40-character SHA-1 commit hash.",scenario:"You need the exact hash of the current tip of main for a script.",accept:["git rev-parse main","git rev-parse main "],feedback:"git rev-parse translates any ref, tag, branch name, or relative expression (HEAD~3, main^2) into its full SHA-1 hash. Essential for scripting around Git."}
  ]
},
{
  title:"Git Hooks",sub:"Automating quality gates at every stage of the workflow",
  sections:[
    {label:"What are hooks?",cards:[
      {title:"Scripts that fire automatically",body:"Git hooks are executable scripts stored in <code>.git/hooks/</code> that run automatically at specific points in the Git lifecycle. They let you enforce code quality, run tests, validate messages, and trigger deployments — without anyone needing to remember to do it manually."},
      {title:"Client vs server hooks",body:"<strong style='font-weight:500'>Client-side</strong> — run on your machine: pre-commit, prepare-commit-msg, commit-msg, post-commit, pre-push, pre-rebase. <strong style='font-weight:500'>Server-side</strong> — run on the Git server: pre-receive, update, post-receive. Server hooks enforce policy for the whole team."}
    ]},
    {label:"Client-side hooks",codeblock:{lang:"bash",code:`<span class="cmt"># Hooks live in .git/hooks/ — make them executable</span>
ls .git/hooks/
<span class="cmt"># pre-commit.sample  commit-msg.sample  pre-push.sample ...</span>

<span class="cmt"># Create a pre-commit hook that runs linting</span>
cat > .git/hooks/pre-commit << <span class="str">'EOF'</span>
#!/bin/sh
npm run lint
if [ $? -ne 0 ]; then
  echo "Linting failed. Fix errors before committing."
  exit 1
fi
EOF
chmod +x .git/hooks/pre-commit

<span class="cmt"># commit-msg: enforce conventional commit format</span>
cat > .git/hooks/commit-msg << <span class="str">'EOF'</span>
#!/bin/sh
MSG=$(cat "$1")
PATTERN="^(feat|fix|docs|style|refactor|test|chore|perf|ci)(\(.+\))?: .{1,72}"
if ! echo "$MSG" | grep -qE "$PATTERN"; then
  echo "ERROR: Commit message must follow Conventional Commits format"
  exit 1
fi
EOF
chmod +x .git/hooks/commit-msg</span>`}},
    {label:"Husky — shareable hooks for teams",codeblock:{lang:"bash",code:`<span class="cmt"># .git/hooks/ is not committed — hooks can't be shared</span>
<span class="cmt"># Husky solves this by storing hooks in the repo itself</span>

npm install --save-dev husky
npx husky init            <span class="cmt"># creates .husky/ directory</span>

<span class="cmt"># Add a pre-commit hook</span>
echo "npm test" > .husky/pre-commit
chmod +x .husky/pre-commit

<span class="cmt"># Add a commit-msg hook</span>
echo "npx commitlint --edit $1" > .husky/commit-msg
chmod +x .husky/commit-msg

<span class="cmt"># package.json — run husky install after npm install</span>
<span class="str">"scripts": { "prepare": "husky install" }</span>

<span class="cmt"># lint-staged: only lint files being committed (fast)</span>
npm install --save-dev lint-staged
<span class="cmt"># .lintstagedrc.json:</span>
<span class="str">{ "*.{js,ts}": ["eslint --fix", "prettier --write"] }</span></span>`}},
    {label:"pre-push and pre-rebase hooks",codeblock:{lang:"bash",code:`<span class="cmt"># pre-push: run full test suite before pushing</span>
cat > .husky/pre-push << <span class="str">'EOF'</span>
#!/bin/sh
npm run test:ci
if [ $? -ne 0 ]; then
  echo "Tests failed. Push aborted."
  exit 1
fi
EOF

<span class="cmt"># pre-rebase: warn before rebasing shared branches</span>
cat > .git/hooks/pre-rebase << <span class="str">'EOF'</span>
#!/bin/sh
BRANCH=$(git branch --show-current)
if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "develop" ]; then
  echo "WARNING: Rebasing $BRANCH is dangerous on shared branches"
  read -p "Continue? [y/N] " confirm
  [ "$confirm" = "y" ] || exit 1
fi
EOF</span>`}}
  ],
  challenges:[
    {q:"Where does Git look for hook scripts on your local machine?",scenario:"You want to manually create a pre-commit hook without using Husky. Which directory do you create the script in?",accept:[".git/hooks",".git/hooks/",".git/hooks/ directory","the .git/hooks directory"],feedback:".git/hooks/ is where Git looks for hook scripts. Each hook is an executable file named after the hook event (pre-commit, commit-msg, etc.). Note: this directory is NOT committed to the repo — use Husky to share hooks with your team."},
    {q:"Why can't you share Git hooks by committing the .git/hooks/ directory, and what tool solves this?",scenario:"Your team wants everyone to have the same pre-commit linting hook. Why doesn't just committing .git/hooks work?",accept:["the .git directory is not tracked by git, husky solves this","git does not track the .git directory, husky","the .git folder is not committed, husky solves it","because .git is not tracked, husky","git doesn't track .git/hooks, husky"],feedback:"The entire .git/ directory is excluded from Git tracking — it's Git's own database, not part of the project content. Husky solves this by storing hooks in a .husky/ directory at the repo root, which IS committed and shared with everyone."},
    {q:"Type the exit code a hook script must return to ABORT the Git operation it's guarding.",scenario:"Your pre-commit hook detected a linting error. What must the script return to prevent the commit from happening?",accept:["1","exit 1","exit code 1","non-zero","any non-zero"],feedback:"Any non-zero exit code from a hook script causes Git to abort the operation. Exit code 0 means success — proceed. Exit code 1 (or any non-zero) means failure — abort. This is standard Unix convention for script exit codes."}
  ]
},
{
  title:"CI/CD with Git",sub:"GitHub Actions, GitLab CI — automating everything on push",
  sections:[
    {label:"What is CI/CD?",cards:[
      {title:"Continuous Integration",body:"Every push triggers an automated pipeline that builds the code, runs tests, and reports back. Catches bugs before they reach main. Everyone's changes are integrated and tested continuously rather than in big batches."},
      {title:"Continuous Deployment",body:"After CI passes, the code is automatically deployed to staging or production. Git events (push to main, merge PR, new tag) become deployment triggers. No manual deploys."}
    ]},
    {label:"GitHub Actions — workflow anatomy",codeblock:{lang:"yaml",code:`<span class="cmt"># .github/workflows/ci.yml</span>
<span class="hl">name</span>: CI

<span class="hl">on</span>:
  <span class="hl2">push</span>:
    <span class="hl3">branches</span>: [main, develop]
  <span class="hl2">pull_request</span>:
    <span class="hl3">branches</span>: [main]

<span class="hl">jobs</span>:
  <span class="hl2">test</span>:
    <span class="hl3">runs-on</span>: ubuntu-latest
    <span class="hl3">steps</span>:
      - <span class="hl">uses</span>: actions/checkout@v4
      - <span class="hl">uses</span>: actions/setup-node@v4
        <span class="hl">with</span>: { node-version: <span class="str">'20'</span> }
      - <span class="hl">run</span>: npm ci
      - <span class="hl">run</span>: npm test
      - <span class="hl">run</span>: npm run build`}},
    {label:"Tag-triggered deployments",codeblock:{lang:"yaml",code:`<span class="cmt"># Deploy to production only when a version tag is pushed</span>
<span class="hl">on</span>:
  <span class="hl2">push</span>:
    <span class="hl3">tags</span>: ['v*.*.*']

<span class="hl">jobs</span>:
  <span class="hl2">deploy</span>:
    <span class="hl3">runs-on</span>: ubuntu-latest
    <span class="hl3">environment</span>: production
    <span class="hl3">steps</span>:
      - <span class="hl">uses</span>: actions/checkout@v4
      - <span class="hl">name</span>: Deploy to production
        <span class="hl">run</span>: ./scripts/deploy.sh
        <span class="hl">env</span>:
          <span class="hl3">DEPLOY_KEY</span>: <span class="str">\${{ secrets.DEPLOY_KEY }}</span></span>`}},
    {label:"GitLab CI equivalent",codeblock:{lang:"yaml",code:`<span class="cmt"># .gitlab-ci.yml</span>
<span class="hl">stages</span>: [test, build, deploy]

<span class="hl">test</span>:
  <span class="hl2">stage</span>: test
  <span class="hl2">image</span>: node:20
  <span class="hl2">script</span>:
    - npm ci
    - npm test
  <span class="hl2">only</span>: [merge_requests, main]

<span class="hl">deploy_prod</span>:
  <span class="hl2">stage</span>: deploy
  <span class="hl2">script</span>: ./deploy.sh
  <span class="hl2">only</span>:
    - <span class="hl3">refs</span>: [tags]
      <span class="hl3">variables</span>: ["\$CI_COMMIT_TAG =~ /^v\\d+\\.\\d+\\.\\d+$/"]</span>`}},
    {label:"Branch protection + required status checks",cards:[
      {title:"Enforce CI before merging",body:"On GitHub: Settings → Branches → Add rule → Require status checks to pass. This blocks ANY merge to main unless the CI pipeline passed. Combined with required reviews, nothing broken reaches production."},
      {title:"CODEOWNERS",body:"Create a <code>.github/CODEOWNERS</code> file to automatically request reviews from specific people when certain files change. <code>* @team/backend</code> (everything), <code>/frontend/ @alice</code> (specific dir), <code>*.sql @db-team</code> (file type)."}
    ]}
  ],
  challenges:[
    {q:"In a GitHub Actions workflow file, what key specifies WHEN the workflow runs (which Git events trigger it)?",scenario:"You're writing a CI workflow. What top-level YAML key defines the trigger events like 'push' and 'pull_request'?",accept:["on","\"on\"","'on'"],feedback:"The 'on' key defines workflow triggers. Common triggers: push (on commits), pull_request (on PR open/update), schedule (cron), workflow_dispatch (manual), release (on GitHub release creation). You can filter by branch or tag pattern."},
    {q:"Where in a GitHub repository do you store GitHub Actions workflow YAML files?",scenario:"You want to add a CI pipeline. What directory path do you create the .yml file in?",accept:[".github/workflows",".github/workflows/","github/workflows",".github/workflows/ directory"],feedback:".github/workflows/ is the required directory. Every .yml or .yaml file in this directory becomes a separate workflow. GitHub automatically detects and runs them based on their 'on' triggers."},
    {q:"What file do you create to automatically assign code reviewers based on which files changed in a pull request?",scenario:"You want database team members automatically added as reviewers whenever any .sql file is modified in a PR.",accept:["codeowners",".github/codeowners","CODEOWNERS",".github/CODEOWNERS"],feedback:"CODEOWNERS (stored in .github/, the repo root, or docs/) maps file patterns to GitHub users or teams. When a PR changes matching files, those owners are automatically requested as reviewers. Works with GitHub's branch protection 'required reviewers' setting."}
  ]
},
{
  title:"Git LFS — Large File Storage",sub:"Versioning binaries, assets, and datasets without bloating your repo",
  sections:[
    {label:"The problem with large files",cards:[
      {title:"Why Git hates binary files",body:"Git stores every version of every file in full. A 50MB PSD file edited 100 times = 5GB in your repo. Binary files don't delta-compress well. Every clone downloads the entire history. Your repo becomes unusable."},
      {title:"What Git LFS does",body:"Git LFS replaces large files in your repo with tiny text pointer files. The actual binary content is stored on a separate LFS server. When you checkout, Git LFS downloads only the version you need — not the entire history of every large file."}
    ]},
    {label:"Installing and using Git LFS",codeblock:{lang:"bash",code:`<span class="cmt"># Install Git LFS (once per machine)</span>
brew install git-lfs          <span class="cmt"># macOS</span>
sudo apt-get install git-lfs  <span class="cmt"># Ubuntu</span>
<span class="hl">git lfs</span> install              <span class="cmt"># enable in your git config</span>

<span class="cmt"># Track file patterns with LFS (per repo)</span>
<span class="hl">git lfs</span> track <span class="str">"*.psd"</span>
<span class="hl">git lfs</span> track <span class="str">"*.mp4"</span>
<span class="hl">git lfs</span> track <span class="str">"*.zip"</span>
<span class="hl">git lfs</span> track <span class="str">"data/**/*.parquet"</span>
<span class="cmt"># This creates/updates .gitattributes — commit it!</span>
<span class="hl">git add</span> .gitattributes
<span class="hl">git commit</span> -m <span class="str">"Track large files with LFS"</span>

<span class="cmt"># Normal git workflow from here — LFS is transparent</span>
<span class="hl">git add</span> design.psd
<span class="hl">git commit</span> -m <span class="str">"Add design mockup"</span>
<span class="hl">git push</span>   <span class="cmt"># LFS files uploaded automatically</span></span>`}},
    {label:"LFS management commands",codeblock:{lang:"bash",code:`<span class="hl">git lfs</span> ls-files            <span class="cmt"># list LFS-tracked files</span>
<span class="hl">git lfs</span> status              <span class="cmt"># show LFS file status</span>
<span class="hl">git lfs</span> track               <span class="cmt"># list current tracking patterns</span>
<span class="hl">git lfs</span> untrack <span class="str">"*.zip"</span>    <span class="cmt"># stop tracking a pattern</span>
<span class="hl">git lfs</span> migrate import --include="*.psd"  <span class="cmt"># migrate existing history</span>
<span class="hl">git lfs</span> pull                <span class="cmt"># force download LFS files</span>
<span class="hl">git lfs</span> prune               <span class="cmt"># clean old LFS objects locally</span>

<span class="cmt"># Clone without downloading LFS files (fast)</span>
<span class="hl">GIT_LFS_SKIP_SMUDGE</span>=1 git clone URL</span>`}},
    {label:"The .gitattributes file",cards:[
      {title:"What LFS creates",body:"When you run <code>git lfs track</code>, it writes to <code>.gitattributes</code>: <code>*.psd filter=lfs diff=lfs merge=lfs -text</code>. This file MUST be committed and pushed so everyone on the team uses LFS for those file types automatically."},
      {title:"Limits",body:"GitHub LFS: 2GB per file, 1GB free storage/bandwidth per month. GitLab: configurable. Self-hosted Git servers need an LFS server configured separately (e.g. MinIO, Gitea, Artifactory)."}
    ]}
  ],
  challenges:[
    {q:"Type the command to tell Git LFS to track all files with a .psd extension.",scenario:"Your design team is adding Photoshop files to the repo. You need to configure LFS before they push.",accept:["git lfs track \"*.psd\"","git lfs track '*.psd'","git lfs track *.psd"],feedback:"git lfs track adds a pattern to .gitattributes marking those files for LFS handling. Remember to commit .gitattributes so every team member's machine knows to use LFS for those files. Without this, team members without LFS configured will just see the pointer files."},
    {q:"After setting up LFS tracking, which file must you commit to share the LFS configuration with your team?",scenario:"You've run git lfs track on several patterns. What file do you need to add and commit?",accept:[".gitattributes","gitattributes",".gitattributes file"],feedback:".gitattributes stores LFS filter rules and other file-specific Git attributes. It must be committed and pushed to the repo so every team member's Git installation knows which files to handle through LFS. Without it, others just get raw pointer files."},
    {q:"Type the environment variable trick to clone a repo WITHOUT downloading LFS binary files — useful for CI pipelines that don't need assets.",scenario:"Your CI build pipeline doesn't need design assets and you want the clone to be as fast as possible.",accept:["git_lfs_skip_smudge=1 git clone","GIT_LFS_SKIP_SMUDGE=1 git clone","GIT_LFS_SKIP_SMUDGE=1"],feedback:"Setting GIT_LFS_SKIP_SMUDGE=1 before git clone tells the LFS smudge filter to skip downloading binary content — you get the pointer files instead. Essential for CI environments where assets aren't needed, dramatically reducing clone time and bandwidth."}
  ]
},
{
  title:"Monorepo Strategies",sub:"Sparse checkout, partial clone, and managing massive repositories",
  sections:[
    {label:"What is a monorepo?",cards:[
      {title:"One repo, many projects",body:"A monorepo stores multiple related projects (frontend, backend, shared libraries, mobile apps) in a single Git repository. Used by Google, Meta, Microsoft, Airbnb. Benefits: atomic cross-project commits, shared tooling, single source of truth."},
      {title:"The scale problem",body:"Monorepos can have millions of files and gigabytes of history. A normal <code>git clone</code> becomes impractical. You need strategies to check out only what you need and download only relevant history."}
    ]},
    {label:"Sparse checkout — check out only part of the tree",codeblock:{lang:"bash",code:`<span class="cmt"># Clone but don't check out files yet</span>
<span class="hl">git clone</span> --no-checkout --depth 1 URL repo
cd repo

<span class="cmt"># Enable sparse checkout</span>
<span class="hl">git sparse-checkout</span> init --cone

<span class="cmt"># Specify which directories you want</span>
<span class="hl">git sparse-checkout</span> set packages/frontend packages/shared

<span class="cmt"># Now checkout — only those directories are populated</span>
<span class="hl">git checkout</span> main

<span class="cmt"># Add more directories later</span>
<span class="hl">git sparse-checkout</span> add packages/api

<span class="cmt"># List what's currently checked out</span>
<span class="hl">git sparse-checkout</span> list

<span class="cmt"># Disable (restore full checkout)</span>
<span class="hl">git sparse-checkout</span> disable</span>`}},
    {label:"Partial clone — download only what you touch",codeblock:{lang:"bash",code:`<span class="cmt"># Clone without any file blobs (metadata only)</span>
<span class="hl">git clone</span> --filter=blob:none URL
<span class="cmt"># Blobs are fetched on-demand when you checkout files</span>

<span class="cmt"># Clone without trees OR blobs (only commits)</span>
<span class="hl">git clone</span> --filter=tree:0 URL

<span class="cmt"># Shallow clone — only recent history</span>
<span class="hl">git clone</span> --depth 50 URL       <span class="cmt"># last 50 commits</span>
<span class="hl">git clone</span> --shallow-since=<span class="str">"2024-01-01"</span> URL

<span class="cmt"># Deepen a shallow clone later</span>
<span class="hl">git fetch</span> --deepen=100
<span class="hl">git fetch</span> --unshallow          <span class="cmt"># get full history</span>

<span class="cmt"># Combine sparse + partial for maximum speed</span>
<span class="hl">git clone</span> --filter=blob:none --no-checkout URL
<span class="hl">git sparse-checkout</span> init --cone
<span class="hl">git sparse-checkout</span> set my-package</span>`}},
    {label:"Monorepo tooling",cards:[
      {title:"Nx",body:"Smart build system for JS/TS monorepos. Understands project dependencies and only rebuilds/retests affected projects. Integrates with Git to detect which projects changed in a PR."},
      {title:"Turborepo",body:"High-performance build system by Vercel. Uses Git-based caching — if files haven't changed since last build, it reuses the cached output. Pipeline-aware: <code>turbo run build --filter=...HEAD^1</code> builds only what changed."},
      {title:"git subtree vs git submodule",body:"<code>git subtree</code> merges another repo's content directly into a subdirectory — simpler to use, history is combined. <code>git submodule</code> keeps repos separate with pointer references — more complex but maintains independent histories."}
    ]}
  ],
  challenges:[
    {q:"Type the git clone flag that downloads only commit metadata without any file blobs, fetching file content on-demand instead.",scenario:"You're setting up a developer machine to work on a 50GB monorepo. You only need a few packages.",accept:["--filter=blob:none","--filter blob:none"],feedback:"--filter=blob:none creates a 'blobless clone' — Git downloads all commits and tree objects (so you have full history and can navigate branches) but skips file blobs until you actually checkout files that need them. Dramatically speeds up cloning large repos."},
    {q:"Type the two commands needed to enable sparse checkout in cone mode and then set it to only include the 'apps/web' directory.",scenario:"After a blobless clone, you want to narrow your working directory to just the frontend app.",accept:["git sparse-checkout init --cone\ngit sparse-checkout set apps/web","git sparse-checkout init --cone\ngit sparse-checkout set apps/web "],feedback:"git sparse-checkout init --cone enables cone mode (which is faster and simpler — you specify directories, not patterns). git sparse-checkout set then specifies exactly which top-level and nested directories to populate. Everything else stays absent from your working directory."},
    {q:"What is the difference between git submodule and git subtree?",scenario:"Your team is debating how to share a common library across multiple repos. What do you tell them?",accept:["submodule keeps repos separate with pointers, subtree merges content directly","submodule references external repos as pointers, subtree copies their content into your repo","submodule uses pointer references to external repos, subtree merges history inline","submodules reference external repos independently, subtree embeds the content directly"],feedback:"git submodule stores a pointer to a specific commit in another repo — the two repos remain independent. git subtree physically copies another repo's content into a subdirectory, merging its history with yours. Subtree is simpler for contributors (no extra init commands) but muddies history. Submodule maintains clean separation but requires extra management steps."}
  ]
},
{
  title:"Git Security",sub:"GPG signing, secret scanning, SSH hardening, and supply chain integrity",
  sections:[
    {label:"Why sign commits?",cards:[
      {title:"The problem: anyone can fake authorship",body:"Git commit author info (name and email) is just config — anyone can set <code>user.email</code> to anyone else's address and commit 'as' them. A signed commit proves the commit was actually made by someone who possesses a specific cryptographic key."},
      {title:"GPG vs SSH signing",body:"Git supports both GPG keys and SSH keys for signing. SSH signing (added in Git 2.34) is simpler — you likely already have an SSH key. GPG signing is the older standard and supported everywhere. GitHub shows a 'Verified' badge on signed commits."}
    ]},
    {label:"Setting up commit signing",codeblock:{lang:"bash",code:`<span class="cmt">── SSH SIGNING (simpler, Git 2.34+) ─────────────</span>
<span class="hl">git config</span> --global gpg.format ssh
<span class="hl">git config</span> --global user.signingkey ~/.ssh/id_ed25519.pub
<span class="hl">git config</span> --global commit.gpgsign true   <span class="cmt"># sign all commits</span>
<span class="cmt"># Add your SSH key as a signing key on GitHub:</span>
<span class="cmt"># Settings → SSH Keys → New → Key type: Signing Key</span>

<span class="cmt">── GPG SIGNING (traditional) ────────────────────</span>
gpg --full-generate-key
gpg --list-secret-keys --keyid-format=long
<span class="cmt"># Copy the key ID (after 'ed25519/')</span>
<span class="hl">git config</span> --global user.signingkey YOUR_KEY_ID
<span class="hl">git config</span> --global commit.gpgsign true
<span class="cmt"># Export public key to GitHub:</span>
gpg --armor --export YOUR_KEY_ID   <span class="cmt"># paste into GitHub GPG keys</span>

<span class="cmt"># Sign a single commit manually</span>
<span class="hl">git commit</span> -S -m <span class="str">"Signed commit"</span>

<span class="cmt"># Verify a commit's signature</span>
<span class="hl">git verify-commit</span> HEAD
<span class="hl">git log</span> --show-signature</span>`}},
    {label:"Secret scanning — keeping credentials out",codeblock:{lang:"bash",code:`<span class="cmt"># NEVER commit secrets. But when it happens:</span>

<span class="cmt">── DETECT ────────────────────────────────────────</span>
<span class="cmt"># gitleaks: scan repo for secrets</span>
brew install gitleaks
gitleaks detect --source . --verbose

<span class="cmt"># trufflehog: deep scan including history</span>
trufflehog git file://. --since-commit HEAD~50

<span class="cmt">── PREVENT ───────────────────────────────────────</span>
<span class="cmt"># pre-commit hook with gitleaks</span>
cat > .husky/pre-commit << <span class="str">'EOF'</span>
gitleaks protect --staged --redact
EOF

<span class="cmt">── REMOVE (if already pushed) ────────────────────</span>
<span class="cmt"># BFG Repo Cleaner — much faster than filter-branch</span>
java -jar bfg.jar --delete-files .env
java -jar bfg.jar --replace-text passwords.txt
<span class="hl">git reflog</span> expire --expire=now --all
<span class="hl">git gc</span> --prune=now --aggressive
<span class="hl">git push</span> --force
<span class="cmt"># ⚠️  REVOKE the exposed secret immediately — always</span></span>`}},
    {label:"SSH and access security",codeblock:{lang:"bash",code:`<span class="cmt"># Use Ed25519 keys (stronger than RSA)</span>
ssh-keygen -t ed25519 -C <span class="str">"work@company.com"</span>

<span class="cmt"># Multiple SSH keys for different accounts</span>
cat >> ~/.ssh/config << <span class="str">'EOF'</span>
Host github-work
  HostName github.com
  User git
  IdentityFile ~/.ssh/id_ed25519_work

Host github-personal
  HostName github.com
  User git
  IdentityFile ~/.ssh/id_ed25519_personal
EOF

<span class="cmt"># Use work account for this repo</span>
<span class="hl">git remote</span> set-url origin git@github-work:company/repo.git

<span class="cmt"># Rotate keys: add new key to GitHub, remove old one</span>
<span class="cmt"># Then update remote URLs to use new key</span></span>`}}
  ],
  challenges:[
    {q:"Type the git config command to make Git automatically sign ALL commits using GPG by default.",scenario:"Your company's security policy requires all commits to be signed. You want to enable this globally.",accept:["git config --global commit.gpgsign true","git config --global commit.gpgsign true ","git config --global commit.gpgsign 1"],feedback:"commit.gpgsign true makes Git sign every commit automatically with your configured signing key. Without this, you'd need to add -S to every commit command. Set this globally so it applies to all your repos."},
    {q:"A secret API key was committed and pushed 3 commits ago. What is the FIRST thing you must do, before even cleaning the Git history?",scenario:"You just discovered AWS_SECRET_KEY was committed to a public repo. What's the immediate priority?",accept:["revoke the secret","revoke or rotate the secret","invalidate the secret","rotate the key","revoke the key","revoke and rotate the exposed secret","revoke the exposed credential"],feedback:"ALWAYS revoke/rotate the exposed secret first — immediately. Git history cleaning takes time and even if you rewrite history, the secret was already exposed during the window it was public. Treat it as compromised the moment it was pushed. Clean the history after the secret is already invalidated."},
    {q:"Type the git log flag that shows the GPG/SSH signature verification status alongside each commit.",scenario:"You want to audit recent commits to confirm they all have verified signatures.",accept:["--show-signature","--show-signature "],feedback:"git log --show-signature shows the signature status for each commit — 'Good signature from...' for valid signatures, or an error for invalid/missing ones. Use this for security audits to ensure all commits on a branch are properly signed."}
  ]
},
{
  title:"Advanced Log & Forensics",sub:"Mastering git log, diff, and blame for deep investigation",
  sections:[
    {label:"git log — the full power",codeblock:{lang:"bash",code:`<span class="cmt">── FILTERING ─────────────────────────────────────</span>
<span class="hl">git log</span> --author=<span class="str">"Alice"</span>
<span class="hl">git log</span> --grep=<span class="str">"JIRA-1234"</span>        <span class="cmt"># search commit messages</span>
<span class="hl">git log</span> --since=<span class="str">"2 weeks ago"</span>
<span class="hl">git log</span> --after=<span class="str">"2024-01-01"</span> --before=<span class="str">"2024-06-01"</span>
<span class="hl">git log</span> main..feature             <span class="cmt"># commits in feature not in main</span>
<span class="hl">git log</span> -S <span class="str">"password"</span>           <span class="cmt"># pickaxe: string added/removed</span>
<span class="hl">git log</span> -G <span class="str">"api_key.*="</span>         <span class="cmt"># pickaxe with regex</span>
<span class="hl">git log</span> -- path/to/file.js        <span class="cmt"># history of one file</span>
<span class="hl">git log</span> --follow -- old-name.js   <span class="cmt"># follow renames</span>
<span class="hl">git log</span> --diff-filter=D           <span class="cmt"># only commits that deleted files</span>
<span class="cmt"># diff-filter values: A=added D=deleted M=modified R=renamed</span>

<span class="cmt">── FORMATTING ────────────────────────────────────</span>
<span class="hl">git log</span> --pretty=format:<span class="str">"%h %an %ar %s"</span>
<span class="hl">git log</span> --pretty=format:<span class="str">"%C(yellow)%h%Creset %s"</span>
<span class="cmt"># Placeholders: %h=short hash %H=full hash %s=subject</span>
<span class="cmt"># %an=author %ae=email %ar=relative date %ad=absolute date</span>
<span class="cmt"># %d=ref names %b=body %n=newline</span>

<span class="cmt">── STATS ─────────────────────────────────────────</span>
<span class="hl">git log</span> --stat                    <span class="cmt"># files changed summary</span>
<span class="hl">git log</span> --numstat                 <span class="cmt"># lines added/removed</span>
<span class="hl">git log</span> --shortstat               <span class="cmt"># one line summary per commit</span>
<span class="hl">git shortlog</span> -sne                 <span class="cmt"># commits per author with email</span></span>`}},
    {label:"Advanced diff",codeblock:{lang:"bash",code:`<span class="cmt"># Better diff algorithm (set globally)</span>
<span class="hl">git config</span> --global diff.algorithm histogram

<span class="cmt"># Word-level diff instead of line-level</span>
<span class="hl">git diff</span> --word-diff
<span class="hl">git diff</span> --word-diff=color

<span class="cmt"># Ignore specific changes</span>
<span class="hl">git diff</span> -w                      <span class="cmt"># ignore whitespace</span>
<span class="hl">git diff</span> --ignore-blank-lines

<span class="cmt"># Compare specific file between branches/commits</span>
<span class="hl">git diff</span> main:src/app.js feature:src/app.js

<span class="cmt"># Show only names of changed files</span>
<span class="hl">git diff</span> --name-only main..feature
<span class="hl">git diff</span> --name-status main..feature</span>`}},
    {label:"git blame — advanced usage",codeblock:{lang:"bash",code:`<span class="hl">git blame</span> -w app.js              <span class="cmt"># ignore whitespace commits</span>
<span class="hl">git blame</span> -M app.js              <span class="cmt"># detect moved lines</span>
<span class="hl">git blame</span> -C app.js              <span class="cmt"># detect copied lines from other files</span>
<span class="hl">git blame</span> --since=<span class="str">"1 year ago"</span>  <span class="cmt"># blame as of a date</span>
<span class="hl">git blame</span> v1.0.0 -- app.js       <span class="cmt"># blame at a specific tag</span>

<span class="cmt"># .git-blame-ignore-revs — ignore bulk formatting commits</span>
<span class="cmt"># Create .git-blame-ignore-revs in repo root:</span>
<span class="cmt"># a1b2c3d4  # Reformat with prettier</span>
<span class="hl">git config</span> blame.ignoreRevsFile .git-blame-ignore-revs</span>`}},
    {label:"rerere — Reuse Recorded Resolutions",codeblock:{lang:"bash",code:`<span class="cmt"># rerere remembers how you resolved a conflict</span>
<span class="cmt"># and reapplies it automatically next time</span>
<span class="hl">git config</span> --global rerere.enabled true

<span class="cmt"># When you resolve a conflict, rerere records it</span>
<span class="cmt"># Next time the same conflict appears (e.g. after rebase):</span>
<span class="cmt"># Git automatically applies your previous resolution</span>

<span class="hl">git rerere</span> status                <span class="cmt"># show recorded resolutions</span>
<span class="hl">git rerere</span> diff                  <span class="cmt"># show what rerere will apply</span>
<span class="hl">git rerere</span> forget path/to/file   <span class="cmt"># forget a resolution</span>
<span class="cmt"># Stored in .git/rr-cache/</span></span>`}}
  ],
  challenges:[
    {q:"Type the git log flag that tracks a file's history even across renames.",scenario:"A file was renamed from 'utils.js' to 'helpers.js' 20 commits ago. You want to see its complete history including before the rename.",accept:["--follow","--follow "],feedback:"git log --follow -- filename traces a file's history through renames. Without --follow, git log stops at the rename and you lose all older history. Always use --follow when investigating a file that may have been renamed."},
    {q:"Type the git log flag and pattern to find every commit where the string 'DROP TABLE' was either added or removed from any file.",scenario:"Security audit: you need to find every commit in history that touched any SQL DROP TABLE statement.",accept:["git log -s \"drop table\"","-s \"DROP TABLE\"","-S \"DROP TABLE\"","-S 'DROP TABLE'","git log -s 'drop table'","git log -S \"DROP TABLE\"","git log -S 'DROP TABLE'","--pickaxe -s drop table"],feedback:"The -S flag (the 'pickaxe') searches for commits where the string was added or removed in the diff content. It's different from --grep which only searches commit messages. Use -G for regex patterns instead of literal strings."},
    {q:"What git config setting enables automatic reuse of previously recorded conflict resolutions?",scenario:"Your team frequently rebases long-running branches onto main and resolves the same conflicts repeatedly. What setting eliminates this repetition?",accept:["rerere.enabled true","rerere.enabled = true","git config rerere.enabled true","git config --global rerere.enabled true"],feedback:"rerere (Reuse Recorded Resolution) records the before/after state of every conflict you resolve. Next time Git encounters the identical conflict, it applies your resolution automatically. Huge time saver on teams that do frequent rebases."}
  ]
},
{
  title:"Repository Maintenance",sub:"gc, fsck, prune, bundle — keeping your repo healthy and fast",
  sections:[
    {label:"git gc — garbage collection",codeblock:{lang:"bash",code:`<span class="cmt"># Git accumulates loose objects over time</span>
<span class="cmt"># gc packs them, removes unreachable objects, compresses</span>
<span class="hl">git gc</span>                         <span class="cmt"># gentle cleanup (auto-triggered sometimes)</span>
<span class="hl">git gc</span> --aggressive            <span class="cmt"># deeper optimisation (slower)</span>
<span class="hl">git gc</span> --prune=now             <span class="cmt"># prune unreachable objects immediately</span>
<span class="hl">git gc</span> --auto                  <span class="cmt"># only run if needed</span>

<span class="cmt"># See what's in your repo before/after gc</span>
<span class="hl">git count-objects</span> -vH
<span class="cmt"># count: 1523  size: 12.34 MiB</span>
<span class="cmt"># in-pack: 45231  packs: 2  size-pack: 234.5 MiB</span>

<span class="cmt"># Configure auto-gc thresholds</span>
<span class="hl">git config</span> gc.auto 256         <span class="cmt"># trigger after 256 loose objects</span>
<span class="hl">git config</span> gc.autoPackLimit 50 <span class="cmt"># trigger after 50 pack files</span></span>`}},
    {label:"git fsck — filesystem check",codeblock:{lang:"bash",code:`<span class="cmt"># Verify integrity of all objects in the database</span>
<span class="hl">git fsck</span>
<span class="cmt"># Checks for: dangling commits, broken links, corrupt objects</span>
<span class="cmt"># "dangling commit" = a commit no ref points to (orphaned)</span>
<span class="cmt"># "dangling blob" = a staged file that was never committed</span>

<span class="hl">git fsck</span> --lost-found          <span class="cmt"># write dangling objects to .git/lost-found/</span>
<span class="hl">git fsck</span> --unreachable         <span class="cmt"># list all unreachable objects</span>
<span class="hl">git fsck</span> --dangling            <span class="cmt"># only dangling objects</span>

<span class="cmt"># Recover a dangling commit:</span>
<span class="hl">git show</span> DANGLING_HASH         <span class="cmt"># inspect it</span>
<span class="hl">git branch</span> recovered DANGLING_HASH  <span class="cmt"># recover it</span></span>`}},
    {label:"git prune and reflog expire",codeblock:{lang:"bash",code:`<span class="cmt"># Prune unreachable objects older than 2 weeks (default)</span>
<span class="hl">git prune</span>

<span class="cmt"># Expire reflog entries (objects are prunable after this)</span>
<span class="hl">git reflog</span> expire --expire=30.days.ago --all
<span class="hl">git reflog</span> expire --expire=now --all  <span class="cmt"># expire everything now</span>

<span class="cmt"># Full cleanup sequence (after BFG history rewrite)</span>
<span class="hl">git reflog</span> expire --expire=now --all
<span class="hl">git gc</span> --prune=now --aggressive
<span class="hl">git push</span> --force --all</span>`}},
    {label:"git bundle — offline transfers",codeblock:{lang:"bash",code:`<span class="cmt"># Bundle your repo into a single portable file</span>
<span class="hl">git bundle</span> create repo.bundle HEAD main
<span class="hl">git bundle</span> create repo.bundle --all   <span class="cmt"># all refs</span>

<span class="cmt"># Clone FROM a bundle file (no network needed)</span>
<span class="hl">git clone</span> repo.bundle my-repo

<span class="cmt"># Create incremental bundles (only new commits)</span>
<span class="hl">git bundle</span> create update.bundle v1.0.0..HEAD

<span class="cmt"># Verify a bundle is valid</span>
<span class="hl">git bundle</span> verify repo.bundle

<span class="cmt"># Use case: transfer repos across air-gapped networks,</span>
<span class="cmt"># offline backup, email a repo to someone</span></span>`}}
  ],
  challenges:[
    {q:"Type the command to run an aggressive garbage collection AND prune all unreachable objects immediately.",scenario:"You just rewrote history with BFG to remove secrets. You need to actually shrink the repo size now.",accept:["git gc --prune=now --aggressive","git gc --aggressive --prune=now"],feedback:"git gc --aggressive --prune=now does a deep optimisation pass (more CPU, better compression) and removes all unreachable objects immediately rather than waiting the default 2-week grace period. Essential after history rewrites to actually reclaim disk space."},
    {q:"Type the command to verify the integrity of all objects in your Git database and report any corruption.",scenario:"A developer reports their clone seems corrupted. What diagnostic command do you run?",accept:["git fsck","git fsck ","git fsck --full"],feedback:"git fsck (filesystem check) walks every object in the Git database and verifies that all pointers are valid and no objects are corrupt. It also reports 'dangling' objects — commits, blobs, or trees that exist in the database but aren't reachable from any ref."},
    {q:"Type the command to create a portable bundle file called 'backup.bundle' containing the entire repository including all branches.",scenario:"You need to send a complete copy of a repo to a colleague who has no internet access.",accept:["git bundle create backup.bundle --all","git bundle create backup.bundle --all "],feedback:"git bundle create packs the entire repo (or a subset) into a single binary file. --all includes every ref. The recipient can git clone backup.bundle or git fetch backup.bundle to use it. Perfect for air-gapped environments, offline backups, or email transfers."}
  ]
},
{
  title:"Enterprise Platforms",sub:"GitHub Enterprise, GitLab, branch protection, CODEOWNERS, audit logs",
  sections:[
    {label:"Branch protection rules",cards:[
      {title:"Protecting main from mistakes",body:"Branch protection rules prevent direct pushes, require PR reviews, enforce CI checks, and block force-pushes on critical branches. Set at the repo or organisation level. Every enterprise team should protect main and develop at minimum."},
      {title:"GitHub branch protection settings",body:`<ul>
        <li>Require pull request reviews before merging (min. 1–2)</li>
        <li>Dismiss stale reviews when new commits are pushed</li>
        <li>Require review from Code Owners</li>
        <li>Require status checks to pass (CI must be green)</li>
        <li>Require branches to be up to date before merging</li>
        <li>Require signed commits</li>
        <li>Restrict who can push to the branch</li>
        <li>Allow force pushes — DISABLE this</li>
      </ul>`}
    ]},
    {label:"CODEOWNERS",codeblock:{lang:"bash",code:`<span class="cmt"># .github/CODEOWNERS  (or repo root, or /docs/)</span>

<span class="cmt"># Global owner — owns everything not matched below</span>
* @org/platform-team

<span class="cmt"># Directory owners</span>
/frontend/          @alice @bob
/backend/           @org/backend-team
/infra/             @org/devops

<span class="cmt"># File type owners</span>
*.sql               @org/database-team
*.tf                @org/devops          <span class="cmt"># Terraform files</span>
Dockerfile          @org/devops
package.json        @org/security-team   <span class="cmt"># dependency changes</span>

<span class="cmt"># Specific files</span>
.github/workflows/  @org/devops
SECURITY.md         @org/security-team</span>`}},
    {label:"Audit logs and compliance",codeblock:{lang:"bash",code:`<span class="cmt"># GitHub audit log — org level (admin only)</span>
<span class="cmt"># Records: who pushed what, when PRs were merged,</span>
<span class="cmt"># permission changes, secret scanning alerts</span>
<span class="cmt"># GitHub → Org Settings → Audit Log</span>
<span class="cmt"># Exportable via API for SIEM integration</span>

<span class="cmt"># Git-level audit: who did what locally</span>
<span class="hl">git log</span> --format=<span class="str">"%h %aI %ae %s"</span> --all   <span class="cmt"># ISO timestamps</span>
<span class="hl">git log</span> --format=<span class="str">"%H %aI %ae %s"</span> > audit.log

<span class="cmt"># Required commit signing for compliance</span>
<span class="cmt"># GitHub: Settings → Branches → Require signed commits</span>
<span class="cmt"># GitLab: Settings → Repository → Push rules → Reject unsigned commits</span></span>`}},
    {label:"Enterprise-specific features",cards:[
      {title:"GitHub Enterprise / GitLab Self-Hosted",body:"On-premise hosting of Git infrastructure. Custom SSO/SAML integration, IP allowlisting, private npm/container registries, secret detection at org level, compliance reporting, SLA guarantees. Managed by your own infra team."},
      {title:"Merge strategies",body:"Configure per-repo merge behavior: <strong style='font-weight:500'>Merge commit</strong> (preserves full history), <strong style='font-weight:500'>Squash and merge</strong> (one commit per PR — cleanest for trunk-based), <strong style='font-weight:500'>Rebase and merge</strong> (linear history, no merge commit). Many enterprise teams enforce squash-only to keep main history clean."},
      {title:"Dependabot & automated PRs",body:"GitHub's Dependabot automatically creates PRs to update vulnerable dependencies. Configure in <code>.github/dependabot.yml</code>. Set review requirements so automated dependency PRs don't bypass your security gates."}
    ]}
  ],
  challenges:[
    {q:"What file do you create to automatically request reviews from specific people or teams when certain files change in a PR?",scenario:"Your org requires the database team to review every migration file. How do you enforce this automatically?",accept:["codeowners","CODEOWNERS",".github/codeowners",".github/CODEOWNERS"],feedback:"CODEOWNERS maps file patterns to GitHub users (@username) or teams (@org/team-name). When a PR modifies matching files, those owners are automatically added as required reviewers. Works with branch protection's 'Require review from Code Owners' setting to enforce it."},
    {q:"Name the THREE recommended merge strategies available on GitHub for merging pull requests.",scenario:"Your engineering manager asks you to explain the options and recommend one for a team practicing trunk-based development.",accept:["merge commit, squash and merge, rebase and merge","merge commit squash and merge rebase and merge","squash and merge, merge commit, rebase and merge","merge, squash, rebase","squash merge rebase"],feedback:"GitHub offers: Merge commit (creates a merge commit, preserves all PR commits), Squash and merge (combines all PR commits into one on main — cleanest for trunk-based dev), Rebase and merge (replays PR commits linearly without a merge commit). Most enterprise teams enforce squash-only for a clean, readable main history."},
    {q:"Type the git log format string to output commits with their full hash, ISO 8601 timestamp, author email, and subject — suitable for an audit log export.",scenario:"Your security team needs a machine-readable audit trail of all commits across all branches.",accept:["git log --format=\"%h %ai %ae %s\" --all","git log --format=\"%H %aI %ae %s\" --all","git log --format='%H %aI %ae %s' --all","git log --format='%h %aI %ae %s' --all","--format=\"%h %ai %ae %s\" --all","--format=\"%H %aI %ae %s\" --all"],feedback:"%H = full hash, %aI = ISO 8601 strict author date (better for parsing than %ai), %ae = author email, %s = subject line. The --all flag includes every branch and tag. Pipe this to a file or your SIEM system for compliance logging."}
  ]
}
,
{
  title:"Connecting to GitHub",sub:"SSH keys, HTTPS, PATs, GitHub CLI — the complete first-time setup",
  sections:[
    {label:"Two ways to authenticate with GitHub",cards:[
      {title:"HTTPS — simple but requires a token",body:"Uses your GitHub username + a Personal Access Token (PAT) as the password. Easier to set up. You'll be prompted for credentials on first push. Can be cached so you don't type it every time. Best for beginners or corporate environments that block SSH."},
      {title:"SSH — set it once, forget it forever",body:"Uses a cryptographic key pair stored on your machine. No passwords ever. Once configured, <code>git push</code> just works silently. Best for daily development. This is what most professional developers use."}
    ]},
    {label:"Step 1 — Create a repo on GitHub",codeblock:{lang:"bash",code:`<span class="cmt"># Option A: Do it on github.com (browser)</span>
<span class="cmt"># 1. Go to github.com → click + → New repository</span>
<span class="cmt"># 2. Name it (e.g. my-project)</span>
<span class="cmt"># 3. Choose Public or Private</span>
<span class="cmt"># 4. Leave README/gitignore/licence UNCHECKED</span>
<span class="cmt">#    (you already have files locally)</span>
<span class="cmt"># 5. Click Create repository</span>
<span class="cmt"># 6. GitHub shows you the push commands — copy them</span>

<span class="cmt"># Option B: GitHub CLI (faster once installed)</span>
gh repo create my-project --public --source=. --remote=origin --push</span>`}},
    {label:"Step 2A — SSH setup (recommended)",codeblock:{lang:"bash",code:`<span class="cmt">── GENERATE YOUR SSH KEY ─────────────────────────</span>
<span class="cmt"># Check if you already have one</span>
ls ~/.ssh/id_ed25519.pub
<span class="cmt"># If file exists, you already have a key — skip to "Add to GitHub"</span>

<span class="cmt"># Generate a new Ed25519 key (stronger than RSA)</span>
ssh-keygen -t ed25519 -C <span class="str">"you@example.com"</span>
<span class="cmt"># Press Enter to accept default location (~/.ssh/id_ed25519)</span>
<span class="cmt"># Enter a passphrase (optional but recommended)</span>

<span class="cmt">── ADD KEY TO SSH AGENT ──────────────────────────</span>
<span class="cmt"># macOS / Linux</span>
eval <span class="str">"$(ssh-agent -s)"</span>
ssh-add ~/.ssh/id_ed25519

<span class="cmt"># macOS — also add to Keychain so it persists reboots</span>
ssh-add --apple-use-keychain ~/.ssh/id_ed25519

<span class="cmt">── COPY YOUR PUBLIC KEY ──────────────────────────</span>
<span class="cmt"># macOS</span>
pbcopy < ~/.ssh/id_ed25519.pub

<span class="cmt"># Linux</span>
cat ~/.ssh/id_ed25519.pub   <span class="cmt"># then copy the output manually</span>
xclip -sel clip < ~/.ssh/id_ed25519.pub  <span class="cmt"># or use xclip</span>

<span class="cmt"># Windows (Git Bash)</span>
clip < ~/.ssh/id_ed25519.pub</span>`}},
    {label:"Step 2A continued — Add SSH key to GitHub",codeblock:{lang:"bash",code:`<span class="cmt"># On GitHub:</span>
<span class="cmt"># 1. Go to github.com → Settings (top right avatar)</span>
<span class="cmt"># 2. Click "SSH and GPG keys" in the left sidebar</span>
<span class="cmt"># 3. Click "New SSH key"</span>
<span class="cmt"># 4. Title: give it a name (e.g. "MacBook Pro 2024")</span>
<span class="cmt"># 5. Key type: Authentication Key</span>
<span class="cmt"># 6. Paste your public key into the Key field</span>
<span class="cmt"># 7. Click "Add SSH key"</span>

<span class="cmt">── TEST THE CONNECTION ───────────────────────────</span>
ssh -T git@github.com
<span class="cmt"># Expected: "Hi USERNAME! You've successfully authenticated."</span>
<span class="cmt"># If you see "Permission denied" — key not added correctly</span>

<span class="cmt">── NOW PUSH USING SSH URL ────────────────────────</span>
<span class="hl">git remote add</span> origin git@github.com:USERNAME/REPO.git
<span class="hl">git branch</span> -M main
<span class="hl">git push</span> -u origin main</span>`}},
    {label:"Step 2B — HTTPS with Personal Access Token (PAT)",codeblock:{lang:"bash",code:`<span class="cmt">── CREATE A PAT ON GITHUB ────────────────────────</span>
<span class="cmt"># GitHub no longer accepts your account password for git push</span>
<span class="cmt"># You must use a Personal Access Token instead</span>
<span class="cmt">#</span>
<span class="cmt"># GitHub → Settings → Developer settings (bottom left)</span>
<span class="cmt"># → Personal access tokens → Tokens (classic)</span>
<span class="cmt"># → Generate new token (classic)</span>
<span class="cmt"># → Give it a name, set expiry, tick: repo, workflow</span>
<span class="cmt"># → Generate token → COPY IT NOW (shown only once)</span>

<span class="cmt">── USE THE TOKEN ─────────────────────────────────</span>
<span class="hl">git remote add</span> origin https://github.com/USERNAME/REPO.git
<span class="hl">git push</span> -u origin main
<span class="cmt"># Username: your GitHub username</span>
<span class="cmt"># Password: paste your PAT (not your account password)</span>

<span class="cmt">── CACHE CREDENTIALS (so you don't type every time) ─</span>
<span class="cmt"># macOS — uses Keychain automatically</span>
<span class="hl">git config</span> --global credential.helper osxkeychain

<span class="cmt"># Linux</span>
<span class="hl">git config</span> --global credential.helper store   <span class="cmt"># saves to disk (plaintext)</span>
<span class="hl">git config</span> --global credential.helper <span class="str">"cache --timeout=3600"</span>  <span class="cmt"># memory only</span>

<span class="cmt"># Windows</span>
<span class="hl">git config</span> --global credential.helper manager  <span class="cmt"># Git Credential Manager</span></span>`}},
    {label:"Step 3 — Your first push (end to end)",codeblock:{lang:"bash",code:`<span class="cmt"># Full sequence from a brand new project folder:</span>

<span class="cmt"># 1. Initialise the repo</span>
<span class="hl">git init</span>
<span class="hl">git add</span> .
<span class="hl">git commit</span> -m <span class="str">"Initial commit"</span>

<span class="cmt"># 2. Rename branch to main (modern standard)</span>
<span class="hl">git branch</span> -M main

<span class="cmt"># 3. Connect to GitHub remote (SSH version)</span>
<span class="hl">git remote add</span> origin git@github.com:USERNAME/REPO.git

<span class="cmt"># 4. Push and set upstream tracking</span>
<span class="hl">git push</span> -u origin main
<span class="cmt"># After this, future pushes are just: git push</span>

<span class="cmt"># 5. Verify remote is set correctly</span>
<span class="hl">git remote</span> -v
<span class="cmt"># origin  git@github.com:USERNAME/REPO.git (fetch)</span>
<span class="cmt"># origin  git@github.com:USERNAME/REPO.git (push)</span></span>`}}
  ],
  challenges:[
    {q:"You generated an SSH key. Type the command to test that it is correctly connected to your GitHub account.",scenario:"You just added your public key on GitHub. Before trying to push, you want to verify the connection works.",accept:["ssh -t git@github.com","ssh -T git@github.com"],feedback:"ssh -T git@github.com tests the SSH connection to GitHub without opening a shell. A successful response is: 'Hi USERNAME! You have successfully authenticated, but GitHub does not provide shell access.' If you get Permission denied, your key was not added correctly."},
    {q:"Type the command to connect your local repo to a GitHub remote called 'origin' using the SSH URL for username 'wiredhash' and repo 'gitcoven'.",scenario:"You created an empty repo on GitHub and now need to link your local project to it.",accept:["git remote add origin git@github.com:wiredhash/gitcoven.git","git remote add origin git@github.com:wiredhash/gitcoven"],feedback:"git remote add origin sets up the connection between your local repo and GitHub. The SSH URL format is always git@github.com:USERNAME/REPO.git. After this you can push with git push -u origin main."},
    {q:"Type the single command to push your local 'main' branch to 'origin' for the first time AND set it as the default upstream so future pushes just need 'git push'.",scenario:"This is your very first push to GitHub. You want to set it up so you never need to specify the remote and branch again.",accept:["git push -u origin main","git push --set-upstream origin main"],feedback:"The -u flag (short for --set-upstream) creates a tracking link between your local main and origin/main. After this, git push and git pull work without any arguments because Git knows where to send and receive changes."},
    {q:"Your push was rejected with 'error: failed to push some refs'. What does this mean and what command do you run to fix it safely?",scenario:"A teammate pushed to main while you were working. Your push got rejected because your local branch is behind the remote.",accept:["git pull --rebase then git push","git pull --rebase","pull --rebase then push","git pull --rebase origin main","run git pull --rebase then git push"],feedback:"A rejected push means the remote has commits your local branch doesn't have yet. git pull --rebase fetches the remote commits and replays your local commits on top, giving a clean linear history. Then git push succeeds. Never force push on shared branches to 'fix' a rejection."}
  ]
},
{
  title:"Pushing to GitLab & Bitbucket",sub:"Platform setup, differences, and multi-remote workflows",
  sections:[
    {label:"GitLab setup",codeblock:{lang:"bash",code:`<span class="cmt">── SSH KEY FOR GITLAB ────────────────────────────</span>
<span class="cmt"># Same SSH key works — just add it to GitLab too</span>
<span class="cmt"># GitLab → avatar → Preferences → SSH Keys</span>
<span class="cmt"># Paste your public key → Add key</span>

<span class="cmt"># Test connection</span>
ssh -T git@gitlab.com
<span class="cmt"># Expected: "Welcome to GitLab, @username!"</span>

<span class="cmt">── PUSH TO GITLAB ────────────────────────────────</span>
<span class="cmt"># Create a new project on gitlab.com first</span>
<span class="hl">git remote add</span> origin git@gitlab.com:USERNAME/REPO.git
<span class="hl">git push</span> -u origin main

<span class="cmt"># GitLab HTTPS with PAT</span>
<span class="cmt"># GitLab → User Settings → Access Tokens</span>
<span class="cmt"># Scope: read_repository + write_repository</span>
<span class="hl">git remote add</span> origin https://oauth2:YOUR_TOKEN@gitlab.com/USERNAME/REPO.git</span>`}},
    {label:"Bitbucket setup",codeblock:{lang:"bash",code:`<span class="cmt">── SSH KEY FOR BITBUCKET ─────────────────────────</span>
<span class="cmt"># Bitbucket → Personal settings → SSH keys → Add key</span>

<span class="cmt"># Test connection</span>
ssh -T git@bitbucket.org
<span class="cmt"># Expected: "authenticated as USERNAME"</span>

<span class="cmt">── PUSH TO BITBUCKET ─────────────────────────────</span>
<span class="cmt"># Create repo on bitbucket.org first</span>
<span class="hl">git remote add</span> origin git@bitbucket.org:USERNAME/REPO.git
<span class="hl">git push</span> -u origin main

<span class="cmt"># Bitbucket App Passwords (alternative to SSH)</span>
<span class="cmt"># Account Settings → App passwords → Create</span>
<span class="cmt"># Permissions: Repositories read + write</span>
<span class="hl">git remote add</span> origin https://USERNAME:APP_PASSWORD@bitbucket.org/USERNAME/REPO.git</span>`}},
    {label:"Pushing to multiple remotes simultaneously",codeblock:{lang:"bash",code:`<span class="cmt"># Mirror your repo to GitHub AND GitLab at the same time</span>

<span class="cmt"># Add a second remote</span>
<span class="hl">git remote add</span> github  git@github.com:USERNAME/REPO.git
<span class="hl">git remote add</span> gitlab  git@gitlab.com:USERNAME/REPO.git

<span class="cmt"># Push to each individually</span>
<span class="hl">git push</span> github main
<span class="hl">git push</span> gitlab main

<span class="cmt"># OR — configure one remote to push to multiple URLs at once</span>
<span class="hl">git remote add</span> origin git@github.com:USERNAME/REPO.git
<span class="hl">git remote set-url</span> --add --push origin git@github.com:USERNAME/REPO.git
<span class="hl">git remote set-url</span> --add --push origin git@gitlab.com:USERNAME/REPO.git

<span class="cmt"># Now git push sends to BOTH GitHub and GitLab</span>
<span class="hl">git push</span>   <span class="cmt"># → pushes to both simultaneously</span>

<span class="cmt"># Verify the setup</span>
<span class="hl">git remote</span> -v</span>`}},
    {label:"Switching from HTTPS to SSH on an existing repo",codeblock:{lang:"bash",code:`<span class="cmt"># Check current remote URL</span>
<span class="hl">git remote</span> -v
<span class="cmt"># origin  https://github.com/USERNAME/REPO.git (fetch)</span>

<span class="cmt"># Switch to SSH</span>
<span class="hl">git remote set-url</span> origin git@github.com:USERNAME/REPO.git

<span class="cmt"># Verify</span>
<span class="hl">git remote</span> -v
<span class="cmt"># origin  git@github.com:USERNAME/REPO.git (fetch)</span></span>`}},
    {label:"Common push errors and fixes",cards:[

// ─── STATE ───────────────────────────────────────────────────
let current = 0;
const completed = new Set();
// challengeState[phaseIdx] = { solved: [false, false, ...], attempts: [0, 0, ...] }
const challengeState = phases.map(p => ({
  solved: new Array(p.challenges.length).fill(false),
  attempts: new Array(p.challenges.length).fill(0)
}));

function isPhaseUnlocked(idx) {
  if (idx === 0) return true;
  return completed.has(idx - 1);
}

function isPhaseChallengesComplete(idx) {
  return challengeState[idx].solved.every(Boolean);
}

// ─── ANSWER CHECKING ─────────────────────────────────────────
function normalize(str) {
  return str.trim().toLowerCase().replace(/\s+/g,' ').replace(/[""]/g,'"').replace(/['']/g,"'");
}

function checkAnswer(phaseIdx, qIdx, userInput) {
  const q = phases[phaseIdx].challenges[qIdx];
  const norm = normalize(userInput);
  return q.accept.some(a => normalize(a) === norm);
}

// ─── NAV ─────────────────────────────────────────────────────
function updateNavButtons() {
  const canNext = isPhaseChallengesComplete(current);
  const isLast = current === phases.length - 1;
  ['next-btn','next-btn2'].forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    if (canNext) {
      btn.classList.remove('btn-locked');
      btn.classList.add('btn-accent');
      btn.textContent = isLast ? '🎓 Finish' : 'Next phase →';
    } else {
      btn.classList.add('btn-locked');
      btn.classList.remove('btn-accent');
      btn.textContent = isLast ? 'Complete challenges' : 'Next phase →';
    }
  });
  const lockIcon = document.getElementById('lock-icon');
  if (lockIcon) lockIcon.textContent = canNext ? '🔓' : '🔒';
}

function navigate(dir) {
  if (dir > 0) {
    if (!isPhaseChallengesComplete(current)) return;
    if (current === phases.length - 1) { showComplete(); return; }
    completed.add(current);
    current++;
  } else {
    if (current > 0) current--;
  }
  saveProgress();
  renderPhase();
  window.scrollTo(0, 0);
}

function goto(idx) {
  if (!isPhaseUnlocked(idx) && idx !== current) return;
  current = idx;
  saveProgress();
  renderPhase();
  window.scrollTo(0, 0);
}

// ─── SIDEBAR ─────────────────────────────────────────────────
const groups = [
  {label:'Fundamentals',range:[0,3]},
  {label:'Core Workflow',range:[4,6]},
  {label:'Collaboration',range:[7,8]},
  {label:'Recovery',range:[9,10]},
  {label:'Advanced',range:[11,13]},
  {label:'Professional',range:[14,15]},
  {label:'Enterprise',range:[16,24]},
  {label:'Platforms & Remotes',range:[25,27]}
];

function buildNav() {
  const navEl = document.getElementById('sidebar-nav');
  navEl.innerHTML = '';
  phases.forEach((p, i) => {
    const grp = groups.find(g => i === g.range[0]);
    if (grp) {
      const lbl = document.createElement('div');
      lbl.className = 'nav-section-label';
      lbl.textContent = grp.label;
      navEl.appendChild(lbl);
    }
    const locked = !isPhaseUnlocked(i);
    const done = completed.has(i) && isPhaseChallengesComplete(i);
    const item = document.createElement('div');
    item.className = `nav-item ${i === current ? 'active' : ''} ${done && i !== current ? 'done' : ''} ${locked ? 'locked-item' : ''}`;
    const numContent = done && i !== current ? '✓' : locked ? '🔒' : String(i+1).padStart(2,'0');
    item.innerHTML = `<div class="nav-num">${numContent}</div><div class="nav-text">${p.title}</div>`;
    item.onclick = () => {
      goto(i);
      if (window.innerWidth <= 768) toggleSidebar();
    };
    navEl.appendChild(item);
  });
  const done = phases.filter((_,i) => completed.has(i) && isPhaseChallengesComplete(i)).length;
  document.getElementById('prog-fill').style.width = (done/phases.length*100)+'%';
  document.getElementById('prog-text').textContent = `${done} / ${phases.length}`;
}

// ─── RENDER ───────────────────────────────────────────────────
function renderPhase() {
  const p = phases[current];
  document.getElementById('tb-phase').textContent = `PHASE ${String(current+1).padStart(2,'0')} OF ${phases.length}`;
  document.getElementById('tb-title').textContent = p.title;
  document.getElementById('phase-counter').textContent = `${current+1} / ${phases.length}`;
  document.getElementById('prev-btn').style.visibility = current === 0 ? 'hidden' : 'visible';
  document.getElementById('prev-btn2').style.visibility = current === 0 ? 'hidden' : 'visible';
  buildNav();
  updateNavButtons();

  const ca = document.getElementById('content-area');
  let html = `<div class="phase-eyebrow">Phase ${current+1} · ${p.title}</div>
    <h1 class="phase-heading">${p.title}</h1>
    <p class="phase-sub">${p.sub}</p>
    <div class="phase-divider"></div>`;

  // Sections
  p.sections.forEach(s => {
    html += `<div class="section"><div class="section-label">${s.label}</div>`;
    if (s.content) html += s.content;
    if (s.cards) {
      html += '<div class="cards">';
      s.cards.forEach(c => {
        html += `<div class="card"><div class="card-title">${c.title}</div><p>${c.body}</p></div>`;
      });
      html += '</div>';
    }
    if (s.codeblock) {
      const id = 'cb_' + Math.random().toString(36).slice(2,8);
      html += `<div class="codeblock-wrap">
        <div class="codeblock-label"><div class="dots"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div><span>${s.codeblock.lang||'bash'}</span></div>
        <button class="copy-btn" id="${id}" onclick="copyCode('${id}')">copy</button>
        <pre id="pre_${id}">${s.codeblock.code}</pre>
      </div>`;
    }
    html += '</div>';
  });

  // Challenges
  html += buildChallengeSection(current);
  html = personalizeLabs(html);
  ca.innerHTML = html;
}

function buildChallengeSection(phaseIdx) {
  const p = phases[phaseIdx];
  const cs = challengeState[phaseIdx];
  const allDone = cs.solved.every(Boolean);
  const solvedCount = cs.solved.filter(Boolean).length;

  let html = `<div class="challenge-section">
    <div class="challenge-header"><div class="challenge-icon">⚡</div><div class="challenge-title">Phase Challenge</div></div>
    <p class="challenge-subtitle">${userName ? userName + ", type" : "Type"} your answers carefully. Get them all right to unlock the next phase.</p>`;

  p.challenges.forEach((q, qi) => {
    const solved = cs.solved[qi];
    const attempts = cs.attempts[qi];
    const cardClass = solved ? 'solved' : '';
    html += `<div class="challenge-card ${cardClass}" id="ccard_${phaseIdx}_${qi}">
      <div class="challenge-q-header">
        <div class="cq-num">${qi+1}</div>
        <div class="cq-text">
          <div class="cq-question">${q.q}</div>
          ${q.scenario ? `<div class="cq-scenario">Scenario: ${q.scenario}</div>` : ''}
          ${attempts > 0 && !solved ? `<div class="attempts-badge ${attempts >= 3 ? 'warning' : ''}">✗ ${attempts} failed attempt${attempts>1?'s':''}</div>` : ''}
        </div>
      </div>
      <div class="challenge-input-row">
        <div class="challenge-input-wrap">
          <input class="challenge-input" id="cinput_${phaseIdx}_${qi}"
            type="text"
            placeholder="${solved ? '✓ Correct' : 'Type your answer here…'}"
            value="${solved ? q.accept[0] : ''}"
            ${solved ? 'disabled' : ''}
            onkeydown="if(event.key==='Enter')submitChallenge(${phaseIdx},${qi})"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
        </div>
        ${solved ? `<button class="challenge-submit" disabled>✓</button>` :
          `<button class="challenge-submit" onclick="submitChallenge(${phaseIdx},${qi})">Submit →</button>`}
      </div>
      <div class="challenge-feedback" id="cfeedback_${phaseIdx}_${qi}">
        <span class="feedback-icon">${solved ? '✓' : '✗'}</span>
        <span>${solved ? q.feedback : ''}</span>
      </div>
    </div>`;
  });

  // Lock bar
  if (allDone) {
    html += `<div class="lock-bar unlocked" id="lockbar_${phaseIdx}">
      <div class="lock-bar-icon">🔓</div>
      <div class="lock-bar-text">
        <div class="lock-bar-title">Phase complete — next phase unlocked</div>
        <div class="lock-bar-sub">All ${p.challenges.length} challenges solved. Click 'Next phase' to continue.</div>
      </div>
    </div>`;
  } else {
    html += `<div class="lock-bar" id="lockbar_${phaseIdx}">
      <div class="lock-bar-icon">🔒</div>
      <div class="lock-bar-text">
        <div class="lock-bar-title">Next phase is locked</div>
        <div class="lock-bar-sub">Solve all ${p.challenges.length} challenges to unlock the next phase.</div>
        <div class="lock-progress-row">${p.challenges.map((_,i) => `<div class="lock-pip ${cs.solved[i]?'done-pip':''}" id="lpip_${phaseIdx}_${i}"></div>`).join('')}</div>
      </div>
    </div>`;
  }

  html += '</div>';
  return html;
}

// ─── CHALLENGE SUBMISSION ────────────────────────────────────
function submitChallenge(phaseIdx, qIdx) {
  const cs = challengeState[phaseIdx];
  if (cs.solved[qIdx]) return;
  const input = document.getElementById(`cinput_${phaseIdx}_${qIdx}`);
  if (!input) return;
  const userVal = input.value;
  if (!userVal.trim()) return;

  cs.attempts[qIdx]++;
  const correct = checkAnswer(phaseIdx, qIdx, userVal);
  const card = document.getElementById(`ccard_${phaseIdx}_${qIdx}`);
  const feedback = document.getElementById(`cfeedback_${phaseIdx}_${qIdx}`);

  if (correct) {
    cs.solved[qIdx] = true;
    card.classList.remove('failed');
    card.classList.add('solved');
    input.disabled = true;
    input.value = phases[phaseIdx].challenges[qIdx].accept[0];
    feedback.innerHTML = `<span class="feedback-icon">✓</span><span>${phases[phaseIdx].challenges[qIdx].feedback}</span>`;
    feedback.style.display = 'flex';

    // Update pip
    const pip = document.getElementById(`lpip_${phaseIdx}_${qIdx}`);
    if (pip) pip.classList.add('done-pip');

    // Check if all done
    if (cs.solved.every(Boolean)) {
      // Replace lock bar
      const lockbar = document.getElementById(`lockbar_${phaseIdx}`);
      if (lockbar) {
        lockbar.className = 'lock-bar unlocked';
        lockbar.innerHTML = `<div class="lock-bar-icon">🔓</div><div class="lock-bar-text"><div class="lock-bar-title">Phase complete — next phase unlocked!</div><div class="lock-bar-sub">All ${phases[phaseIdx].challenges.length} challenges solved. Click 'Next phase' to continue.</div></div>`;
        lockbar.scrollIntoView({behavior:'smooth',block:'nearest'});
      }
      saveProgress();
      updateNavButtons();
      buildNav();
    }
  } else {
    card.classList.remove('failed');
    void card.offsetWidth; // force reflow for re-trigger animation
    card.classList.add('failed');
    feedback.innerHTML = `<span class="feedback-icon">✗</span><span>That's not right. Think carefully and try again.</span>`;
    feedback.style.display = 'flex';
    input.focus();
    input.select();
    // Update attempts badge
    const attemptsEl = card.querySelector('.attempts-badge');
    if (attemptsEl) {
      attemptsEl.textContent = `✗ ${cs.attempts[qIdx]} failed attempt${cs.attempts[qIdx]>1?'s':''}`;
      if (cs.attempts[qIdx] >= 3) attemptsEl.classList.add('warning');
    } else {
      const qText = card.querySelector('.cq-text');
      const badge = document.createElement('div');
      badge.className = `attempts-badge ${cs.attempts[qIdx] >= 3 ? 'warning' : ''}`;
      badge.textContent = `✗ ${cs.attempts[qIdx]} failed attempt${cs.attempts[qIdx]>1?'s':''}`;
      qText.appendChild(badge);
    }
  }
}

// ─── COPY CODE ────────────────────────────────────────────────
function copyCode(id) {
  const pre = document.getElementById('pre_' + id);
  if (!pre) return;
  navigator.clipboard.writeText(pre.innerText).then(() => {
    const btn = document.getElementById(id);
    btn.textContent = 'copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ─── COMPLETE SCREEN ─────────────────────────────────────────

  completed.add(current);
  buildNav();
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-text').textContent = `${phases.length} / ${phases.length}`;
  const totalChallenges = phases.reduce((a,p) => a + p.challenges.length, 0);
