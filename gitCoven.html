        <div class="stat-box"><div class="stat-num">25</div><div class="stat-label">Phases completed</div></div>
        <div class="stat-box"><div class="stat-num">${totalChallenges}</div><div class="stat-label">Challenges crushed</div></div>
        <div class="stat-box"><div class="stat-num">0</div><div class="stat-label">Hints used</div></div>
      </div>
      <button class="btn btn-accent" style="margin-top:28px;padding:10px 28px;font-size:14px" onclick="goto(0)">Review from the beginning</button>
    </div>`;
  ['next-btn','next-btn2'].forEach(id => {
    const b = document.getElementById(id);
    if (b) { b.classList.remove('btn-locked'); b.classList.add('btn-accent'); b.textContent = '← Back'; b.onclick = () => navigate(-1); }
  });
}

// ─── INIT ─────────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const btn = document.getElementById('mob-toggle');
  const isOpen = sidebar.classList.toggle('open');
  overlay.classList.toggle('open', isOpen);
  btn.classList.toggle('hidden', isOpen);
}

// ─── NAME & LOCALSTORAGE ──────────────────────────────────────
let userName = '';

const LS_NAME = 'gitcoven_name';
const LS_PROGRESS = 'gitcoven_progress';
const LS_CHALLENGES = 'gitcoven_challenges';
const LS_CURRENT = 'gitcoven_current';

function saveProgress() {
  try {
    localStorage.setItem(LS_NAME, userName);
    localStorage.setItem(LS_CURRENT, String(current));
    localStorage.setItem(LS_PROGRESS, JSON.stringify([...completed]));
    localStorage.setItem(LS_CHALLENGES, JSON.stringify(challengeState.map(cs => ({
      solved: cs.solved,
      attempts: cs.attempts
    }))));
  } catch(e) {}
}

function loadProgress() {
  try {
    const savedName = localStorage.getItem(LS_NAME);
    if (savedName) {
      userName = savedName;
      return true;
    }
  } catch(e) {}
  return false;
}

function restoreProgress() {
  try {
    const savedCurrent = localStorage.getItem(LS_CURRENT);
    const savedProgress = localStorage.getItem(LS_PROGRESS);
    const savedChallenges = localStorage.getItem(LS_CHALLENGES);
    if (savedCurrent) current = parseInt(savedCurrent) || 0;
    if (savedProgress) {
      const arr = JSON.parse(savedProgress);
      arr.forEach(i => completed.add(i));
    }
    if (savedChallenges) {
      const arr = JSON.parse(savedChallenges);
      arr.forEach((cs, i) => {
        if (challengeState[i]) {
          challengeState[i].solved = cs.solved;
          challengeState[i].attempts = cs.attempts;
        }
      });
    }
  } catch(e) {}
}

function submitName() {
  const input = document.getElementById('name-input');
  const val = input ? input.value.trim() : '';
  if (!val) { if(input){ input.style.borderColor='var(--accent-red)'; input.focus(); } return; }
  userName = val;
  saveProgress();
  document.getElementById('name-overlay').style.display = 'none';
  updateUserDisplay();
  renderPhase();
}

function updateUserDisplay() {
  const el = document.getElementById('topbar-user');
  if (el && userName) {
    el.innerHTML = `<span style="color:var(--text3)">👤</span><span class="topbar-user-name">${userName}</span>`;
  }
  // Update sidebar sub
  const sub = document.querySelector('.logo-sub');
  if (sub && userName) sub.textContent = `Hey, ${userName} 👋`;
  // Update complete title if visible
  const ct = document.getElementById('complete-title');
  if (ct) ct.textContent = `You did it, ${userName}!`;
}

// Allow Enter key on name input
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('name-input');
  if (input) input.addEventListener('keydown', e => { if(e.key === 'Enter') submitName(); });
});

// Replace [NAME] in lab steps with actual user name
function personalizeLabs(html) {
  if (!userName) return html;
  return html
    .replace(/\[NAME\]/g, userName)
    .replace(/your name/gi, match => userName)
    .replace(/"Your Name"/g, `"${userName}"`)
    .replace(/'Your Name'/g, `'${userName}'`);
}

// ─── STARTUP ──────────────────────────────────────────────────
const hasName = loadProgress();
if (hasName && userName) {
  restoreProgress();
  document.getElementById('name-overlay').style.display = 'none';
  updateUserDisplay();
  renderPhase();
} else {
  // Show name prompt — focus input after slight delay
  setTimeout(() => {
    const inp = document.getElementById('name-input');
    if (inp) inp.focus();
  }, 200);
}
</script>
